<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DT1 Pro Care</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --grad-morado: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --grad-rojo: linear-gradient(135deg, #ff5f6d 0%, #ffc371 100%);
            --grad-azul: linear-gradient(135deg, #2193b0 0%, #6dd5ed 100%);
            --grad-verde: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            --white: #ffffff;
            --text: #2d3436;
        }

        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            margin: 0; padding: 20px;
            display: flex; justify-content: center;
            color: var(--text);
        }

        .app-container { width: 100%; max-width: 400px; }

        h1 { 
            text-align: center; font-weight: 800; font-size: 1.8rem;
            background: var(--grad-morado); -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; margin-bottom: 30px;
        }

        /* Dashboard Grid */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        .card-btn {
            background: var(--white);
            border-radius: 24px;
            padding: 25px 10px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255,255,255,0.8);
            cursor: pointer;
        }

        .card-btn:active { transform: scale(0.92); }

        .icon-circle {
            width: 60px; height: 60px; border-radius: 50%;
            margin: 0 auto 12px; display: flex; align-items: center;
            justify-content: center; font-size: 24px; color: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .bg-morado { background: var(--grad-morado); }
        .bg-rojo { background: var(--grad-rojo); }
        .bg-azul { background: var(--grad-azul); }
        .bg-verde { background: var(--grad-verde); }

        .card-btn span { font-weight: 700; font-size: 0.85rem; color: #636e72; text-transform: uppercase; letter-spacing: 1px; }

        /* Formulario Secciones */
        .seccion { 
            display: none; background: var(--white); 
            padding: 30px; border-radius: 30px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .header-box { display: flex; align-items: center; margin-bottom: 25px; }
        .btn-back { 
            background: #eee; border: none; width: 40px; height: 40px; 
            border-radius: 12px; cursor: pointer; font-size: 1.2rem; margin-right: 15px;
        }

        label { display: block; margin-top: 20px; font-weight: 700; font-size: 0.8rem; color: #b2bec3; text-transform: uppercase; }
        
        input, select { 
            width: 100%; padding: 15px; margin-top: 8px; border: 2px solid #f1f3f5;
            border-radius: 15px; font-size: 1rem; outline: none; transition: 0.2s;
            background: #f8f9fa;
        }

        input:focus { border-color: #764ba2; background: white; box-shadow: 0 0 10px rgba(118,75,162,0.1); }

        .btn-send { 
            width: 100%; border: none; padding: 18px; border-radius: 15px; 
            color: white; font-weight: 800; font-size: 1rem; margin-top: 30px;
            cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .btn-send.purple { background: var(--grad-morado); }
        .btn-send.red { background: var(--grad-rojo); }
        .btn-send.blue { background: var(--grad-azul); }
        .btn-send.green { background: var(--grad-verde); }

        /* Mensaje de éxito flotante */
        #toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #2d3436; color: white; padding: 12px 25px;
            border-radius: 50px; display: none; font-weight: 600; z-index: 100;
        }

    </style>
</head>
<body>

<div class="app-container">
    <h1>Diario Pro DT1</h1>

    <div id="menu" class="menu-grid">
        <div class="card-btn" onclick="openSec('sec-regla')">
            <div class="icon-circle bg-morado">📅</div>
            <span>Regla</span>
        </div>
        <div class="card-btn" onclick="openSec('sec-eventos')">
            <div class="icon-circle bg-rojo">⚠️</div>
            <span>Avisos</span>
        </div>
        <div class="card-btn" onclick="openSec('sec-glucosa')">
            <div class="icon-circle bg-azul">🩸</div>
            <span>Glucosa</span>
        </div>
        <div class="card-btn" onclick="openSec('sec-media')">
            <div class="icon-circle bg-verde">📊</div>
            <span>Media</span>
        </div>
    </div>

    <div id="sec-regla" class="seccion">
        <div class="header-box"><button class="btn-back" onclick="goHome()">←</button><h2 style="margin:0">Ciclo</h2></div>
        <label>Inicio</label><input type="date" id="regla_ini">
        <label>Fin</label><input type="date" id="regla_fin">
        <button class="btn-send purple" onclick="sendData('REGLA')">Guardar Registro</button>
    </div>

    <div id="sec-eventos" class="seccion">
        <div class="header-box"><button class="btn-back" onclick="goHome()">←</button><h2 style="margin:0">Alertas</h2></div>
        <label>Tipo de Evento</label>
        <select id="evento_tipo">
            <option value="Hipo <60">🔴 Hipoglucemia Grave</option>
            <option value="Hiper >240">🟠 Hiperglucemia (>240)</option>
        </select>
        <button class="btn-send red" onclick="sendData('EVENTOS')">Enviar Alerta</button>
    </div>

    <div id="sec-glucosa" class="seccion">
        <div class="header-box"><button class="btn-back" onclick="goHome()">←</button><h2 style="margin:0">Medición</h2></div>
        <label>Glucosa mg/dL</label>
        <input type="number" id="glu_val" placeholder="000">
        <label>Marca Especial</label>
        <select id="glu_marca">
            <option value="Normal">Normal</option>
            <option value="Ayunas >130">☀️ Ayunas >130</option>
            <option value="Ayunas <80">🌙 Ayunas <80</option>
        </select>
        <button class="btn-send blue" onclick="sendData('GLUCOSA')">Registrar Glucosa</button>
    </div>

    <div id="sec-media" class="seccion">
        <div class="header-box"><button class="btn-back" onclick="goHome()">←</button><h2 style="margin:0">Manual</h2></div>
        <label>Media Semanal</label>
        <input type="number" id="med_val" placeholder="Ej: 135">
        <button class="btn-send green" onclick="sendData('MEDIA')">Guardar Media</button>
    </div>
</div>

<div id="toast">¡Guardado con éxito! ✨</div>

<script>
    const URL_SCRIPT = "TU_URL_DEL_EXEC_AQUI";

    function openSec(id) {
        document.getElementById('menu').style.display = 'none';
        document.querySelectorAll('.seccion').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    function goHome() {
        document.getElementById('menu').style.display = 'grid';
        document.querySelectorAll('.seccion').forEach(s => s.style.display = 'none');
    }

    async function sendData(destino) {
        const toast = document.getElementById('toast');
        let datos = { destino: destino };
        
        if(destino === 'REGLA') {
            datos.comienzo = document.getElementById('regla_ini').value;
            datos.fin = document.getElementById('regla_fin').value;
        } else if(destino === 'EVENTOS') {
            datos.evento = document.getElementById('evento_tipo').value;
        } else if(destino === 'GLUCOSA') {
            datos.glucosa = document.getElementById('glu_val').value;
            datos.marca = document.getElementById('glu_marca').value;
        } else if(destino === 'MEDIA') {
            datos.valor = document.getElementById('med_val').value;
        }

        try {
            await fetch(URL_SCRIPT, { method: 'POST', mode: 'no-cors', body: JSON.stringify(datos) });
            toast.style.display = "block";
            setTimeout(() => { toast.style.display = "none"; goHome(); }, 2000);
        } catch(e) {
            alert("Error al guardar");
        }
    }
</script>

</body>
</html>

</body>
</html>
