<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wonderland Candy Elite</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=Grandstander:wght@700;900&display=swap');
        
        :root { 
            --rosa: #ff4dff; 
            --azul: #00d4ff; 
            --lila: #a64dff; 
            --verde: #39ff14; 
            --fondo: #0a001a;
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.2);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Bubblegum Sans', cursive; 
            margin: 0; 
            background: var(--fondo);
            /* FONDO COMPLEJO: Degradado + Ruido + Brillos */
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(166, 77, 255, 0.2) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 212, 255, 0.15) 0%, transparent 40%),
                url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.2'/%3E%3C/svg%3E");
            background-attachment: fixed;
            color: white; 
            min-height: 100vh;
        }

        /* LLUVIA DE CARAMELOS */
        #loader {
            position: fixed; inset: 0;
            background: rgba(10, 0, 26, 0.95);
            display: none; z-index: 10000;
            backdrop-filter: blur(20px);
        }
        .candy { position: absolute; font-size: 2.5rem; animation: fall linear infinite; filter: drop-shadow(0 0 10px white); }
        @keyframes fall {
            0% { transform: translateY(-15vh) rotate(0deg); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        /* LOGIN */
        #bloqueo { position: fixed; inset: 0; background: var(--fondo); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .pass-input { 
            background: var(--glass); border: 3px solid var(--rosa); color: white; 
            padding: 15px; border-radius: 25px; text-align: center; font-size: 2rem; 
            width: 80%; font-family: 'Grandstander'; box-shadow: 0 0 20px var(--rosa);
        }

        /* CONTENEDORES GLASS */
        .app-container { width: 100%; max-width: 450px; padding: 25px; margin: auto; }
        h1 { font-family: 'Grandstander'; font-size: 3.5rem; text-align: center; background: linear-gradient(to bottom, #fff, var(--rosa)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.5)); margin-top: 10px; }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            margin-bottom: 20px;
        }

        /* MENÚ */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { 
            background: var(--glass); border-radius: 25px; padding: 20px; text-align: center;
            border: 1px solid var(--border); transition: 0.3s;
        }
        .card:active { transform: scale(0.95); background: rgba(255,255,255,0.2); }
        .card i { font-style: normal; font-size: 2.8rem; display: block; margin-bottom: 5px; }
        .card b { font-family: 'Grandstander'; color: var(--azul); letter-spacing: 1px; }

        /* BOTONES CARAMELO */
        .btn-box { 
            width: 100%; padding: 20px; border-radius: 20px; border: none; 
            color: white; font-family: 'Grandstander'; font-size: 1.3rem; 
            margin-bottom: 15px; cursor: pointer;
            box-shadow: 0 8px 0 rgba(0,0,0,0.3), inset 0 2px 4px rgba(255,255,255,0.4);
            text-shadow: 1px 2px 4px rgba(0,0,0,0.4);
            transition: 0.2s;
        }
        .btn-box:active { transform: translateY(4px); box-shadow: 0 4px 0 rgba(0,0,0,0.3); }

        /* INPUTS ESTILO WONDERLAND */
        input, select { 
            width: 100%; padding: 15px; border-radius: 18px; border: 3px solid var(--lila); 
            background: rgba(0,0,0,0.3); color: white; font-family: 'Bubblegum Sans'; 
            font-size: 1.2rem; margin-top: 10px; outline: none;
        }

        /* STATUS BOTONES (HIPO/OK/HIPER) */
        .st-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 15px; }
        .st-btn { padding: 12px; border-radius: 15px; font-family: 'Grandstander'; cursor: pointer; text-align: center; border: 2px solid transparent; opacity: 0.4; transition: 0.3s; }
        .st-btn.active { opacity: 1; border-color: white; transform: scale(1.1); box-shadow: 0 0 15px currentColor; }

        /* SECCIONES */
        .sec { display: none; animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* RESUMEN ESTILO CRÓNICA */
        .cronica-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-bottom: 1px dashed rgba(255,255,255,0.1);
        }
        .cronica-row:last-child { border: none; }
        .cronica-tag { font-family: 'Grandstander'; font-size: 0.9rem; color: var(--azul); text-transform: uppercase; }
        .cronica-val { font-size: 1.3rem; text-align: right; }
        
        .food-item {
            background: rgba(255,255,255,0.05); border-radius: 15px; padding: 12px; margin: 10px 0;
            border-left: 5px solid var(--lila);
        }

        .destaque { color: var(--rosa); text-shadow: 0 0 8px var(--rosa); font-weight: 900; }
        #notif { position: fixed; top: 40%; left: 50%; transform: translateX(-50%); background: white; color: var(--lila); padding: 25px 40px; border-radius: 50px; font-family: 'Grandstander'; font-size: 2rem; z-index: 10001; display: none; border: 10px solid var(--verde); box-shadow: 0 0 50px var(--verde); }
    </style>
</head>
<body>

<div id="loader"><div id="candy-wrap"></div><div style="position:absolute;top:55%;left:50%;transform:translate(-50%,-50%);font-family:'Grandstander';font-size:2rem;color:white;text-align:center;">HORNEANDO...</div></div>
<div id="notif">¡HECHO! ✨</div>

<div id="bloqueo">
    <h1 style="margin-bottom:40px">Wonderland</h1>
    <input type="password" id="pass" class="pass-input" placeholder="PALABRA MÁGICA">
    <button onclick="acceder()" class="btn-box" style="background:var(--rosa); width:auto; margin-top:40px; padding:15px 60px;">ABRIR DIARIO</button>
</div>

<div class="app-container" id="app" style="display:none">
    <h1>Mi Diario</h1>
    
    <div id="menu" class="menu-grid">
        <div class="card" onclick="ir('s-glu')"><i>🍬</i><b>AYUNAS</b></div>
        <div class="card" onclick="ir('s-com')"><i>🍱</i><b>BANQUETES</b></div>
        <div class="card" onclick="ir('s-ale')"><i>🍄</i><b>SUSTOS</b></div>
        <div class="card" onclick="ir('s-reg')"><i>🎀</i><b>CICLO</b></div>
        <div class="card" onclick="ir('s-med')"><i>🍭</i><b>MEDIA</b></div>
        <div class="card" style="grid-column: span 2; background: linear-gradient(to right, var(--lila), var(--rosa))" onclick="obtenerResumen()"><i>✨</i><b>CRÓNICA DE HOY</b></div>
    </div>

    <div id="s-glu" class="sec">
        <button class="btn-box" style="background:var(--azul)" onclick="volver()">← VOLVER</button>
        <div class="glass-card">
            <button class="btn-box" style="background:var(--lila)" onclick="enviar({destino:'GLUCOSA', valor:'MAYOR DE 130'})">MAYOR DE 130 ▲</button>
            <button class="btn-box" style="background:var(--rosa)" onclick="enviar({destino:'GLUCOSA', valor:'MENOR DE 80'})">MENOR DE 80 ▼</button>
            <button class="btn-box" style="background:var(--verde); color:black" onclick="enviar({destino:'GLUCOSA', valor:'OK'})">ESTADO OK</button>
        </div>
    </div>

    <div id="s-com" class="sec">
        <button class="btn-box" style="background:var(--azul)" onclick="volver()">← VOLVER</button>
        <div class="glass-card">
            <input type="text" id="c-nom" placeholder="¿Qué delicia has comido?">
            <select id="c-tipo">
                <option>Desayuno</option>
                <option>Almuerzo</option>
                <option>Comida</option>
                <option>Merienda</option>
                <option>Cena</option>
            </select>
            <input type="number" id="c-ins" placeholder="Unidades de Insulina">
            <div class="st-grid">
                <div class="st-btn" id="h-hipo" style="background:var(--azul)" onclick="setSt('HIPO')">HIPO</div>
                <div class="st-btn active" id="h-ok" style="background:var(--verde); color:black" onclick="setSt('OK')">OK</div>
                <div class="st-btn" id="h-hiper" style="background:var(--rosa)" onclick="setSt('HIPER')">HIPER</div>
            </div>
            <button class="btn-box" style="background:var(--lila); margin-top:25px" onclick="envCom()">GUARDAR BANQUETE</button>
        </div>
    </div>

    <div id="s-reg" class="sec">
        <button class="btn-box" style="background:var(--azul)" onclick="volver()">← VOLVER</button>
        <div class="glass-card">
            <button class="btn-box" style="background:var(--rosa)" onclick="enviar({destino:'CICLO', valor:'INICIO'})">INICIO CICLO 🎀</button>
            <button class="btn-box" style="background:var(--lila)" onclick="enviar({destino:'CICLO', valor:'FIN'})">FIN CICLO ✨</button>
        </div>
    </div>

    <div id="s-med" class="sec">
        <button class="btn-box" style="background:var(--azul)" onclick="volver()">← VOLVER</button>
        <div class="glass-card">
            <input type="number" id="v-med" placeholder="Introduce el valor media">
            <button class="btn-box" style="background:var(--verde); color:black; margin-top:15px" onclick="enviar({destino:'MEDIA', valor:document.getElementById('v-med').value})">REGISTRAR MEDIA</button>
        </div>
    </div>

    <div id="s-ale" class="sec">
        <button class="btn-box" style="background:var(--azul)" onclick="volver()">← VOLVER</button>
        <div class="glass-card">
            <button class="btn-box" style="background:var(--rosa)" onclick="enviar({destino:'ALERTAS', valor:'SANGRE BAJA'})">¡SANGRE BAJA! 🩸</button>
            <button class="btn-box" style="background:var(--lila)" onclick="enviar({destino:'ALERTAS', valor:'SANGRE ALTA'})">¡SANGRE ALTA! 🩸</button>
        </div>
    </div>

    <div id="s-res" class="sec">
        <button class="btn-box" style="background:var(--azul)" onclick="volver()">← VOLVER</button>
        <div id="res-cont"></div>
    </div>
</div>

<script>
    const URL_APP = "https://script.google.com/macros/s/AKfycbzdYhjgVmixnrpw0nBCOTTGRPob5J2oU9unnz5VjaKhDrZz_F-qOl6vTZsZZQnzqtNm/exec"; 
    let curSt = "OK";
    let candyInterval;

    function acceder() { if(document.getElementById('pass').value === "Idnopiras") { document.getElementById('bloqueo').style.display='none'; document.getElementById('app').style.display='block'; } }
    function ir(id) { document.getElementById('menu').style.display='none'; document.getElementById(id).style.display='block'; }
    function volver() { document.getElementById('menu').style.display='grid'; document.querySelectorAll('.sec').forEach(s=>s.style.display='none'); }
    function setSt(v) { curSt = v; document.querySelectorAll('.st-btn').forEach(b=>b.classList.remove('active')); document.getElementById('h-'+v.toLowerCase()).classList.add('active'); }

    function startCandyRain() {
        const wrap = document.getElementById('candy-wrap');
        document.getElementById('loader').style.display='block';
        candyInterval = setInterval(() => {
            const c = document.createElement('div');
            c.className = 'candy';
            c.innerText = ['🍬','🍭','🍫','🍩','🍪','🍨','🧁'][Math.floor(Math.random()*7)];
            c.style.left = Math.random()*100 + 'vw';
            const dur = (Math.random()*2 + 1.5) + 's';
            c.style.animationDuration = dur;
            wrap.appendChild(c);
            setTimeout(() => c.remove(), parseFloat(dur)*1000);
        }, 80);
    }

    function stopCandyRain() { clearInterval(candyInterval); document.getElementById('loader').style.display='none'; }

    function enviar(d) {
        startCandyRain();
        fetch(URL_APP, { method:'POST', mode:'no-cors', body:JSON.stringify(d) })
        .then(() => {
            stopCandyRain();
            document.getElementById('notif').style.display='block';
            setTimeout(() => { document.getElementById('notif').style.display='none'; volver(); }, 2000);
        });
    }

    function envCom() {
        const plato = document.getElementById('c-nom').value;
        if(!plato) return alert("¿Qué has comido, Alicia?");
        enviar({
            destino: 'COMIDAS',
            tipo: document.getElementById('c-tipo').value,
            comida: plato,
            insulina: document.getElementById('c-ins').value,
            estado: curSt
        });
    }

    async function obtenerResumen() {
        ir('s-res');
        startCandyRain();
        try {
            const r = await fetch(URL_APP);
            const d = await r.json();
            
            let h = `<h2 style="font-family:'Grandstander'; text-align:center; color:var(--rosa); font-size:2rem; margin-bottom:10px;">Crónica de Hoy</h2>`;
            
            // PANEL GENERAL
            h += `<div class="glass-card">
                    <div class="cronica-row"><span class="cronica-tag">🌅 Ayunas</span><span class="cronica-val destaque">${d.ayunas}</span></div>
                    <div class="cronica-row"><span class="cronica-tag">🍭 Media</span><span class="cronica-val">${d.media}</span></div>
                    <div class="cronica-row"><span class="cronica-tag">🎀 Ciclo</span><span class="cronica-val">${d.ciclo || d.cicloEstado || 'Sin actividad'}</span></div>
                  </div>`;

            // PANEL BANQUETES (Por tipos)
            h += `<h3 style="font-family:'Grandstander'; color:var(--azul); margin: 20px 0 10px 10px;">Los Banquetes</h3>`;
            h += `<div class="glass-card">`;
            let hayComidas = false;
            // Si el script manda el objeto comidas, lo recorremos
            const lista = d.comidas || {};
            const tipos = ["Desayuno", "Almuerzo", "Comida", "Merienda", "Cena"];
            
            tipos.forEach(t => {
                if(lista[t]) {
                    hayComidas = true;
                    h += `<div class="food-item">
                            <div style="color:var(--azul); font-family:'Grandstander'; font-size:0.8rem; text-transform:uppercase">${t}</div>
                            <div style="font-size:1.2rem; margin:5px 0">${lista[t].plato}</div>
                            <div style="font-size:0.9rem; opacity:0.8">${lista[t].insu}u Insulina • <span class="destaque">${lista[t].estado}</span></div>
                          </div>`;
                }
            });
            if(!hayComidas) h += `<p style="text-align:center; opacity:0.5; font-style:italic">No hay banquetes registrados aún.</p>`;
            h += `</div>`;

            // PANEL ALERTAS
            h += `<h3 style="font-family:'Grandstander'; color:var(--rosa); margin: 20px 0 10px 10px;">Sustos y Alertas</h3>`;
            h += `<div class="glass-card">`;
            if(d.alertas && d.alertas.length > 0) {
                d.alertas.forEach(a => {
                    h += `<div class="cronica-row"><span>🍄 ${a.tipo}</span><span style="font-size:0.8rem; opacity:0.6">${a.hora}</span></div>`;
                });
            } else {
                h += `<p style="text-align:center; opacity:0.5; font-style:italic">Hoy el bosque está en calma.</p>`;
            }
            h += `</div>`;

            document.getElementById('res-cont').innerHTML = h;
        } catch(e) { 
            document.getElementById('res-cont').innerHTML = "<div class='glass-card'>El espejo está empañado... vuelve a intentar.</div>"; 
        }
        stopCandyRain();
    }
</script>
</body>
</html>
