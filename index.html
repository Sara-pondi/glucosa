<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DT1 Pro Care - Privado</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --grad-morado: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --grad-rojo: linear-gradient(135deg, #ff5f6d 0%, #ffc371 100%);
            --grad-azul: linear-gradient(135deg, #2193b0 0%, #6dd5ed 100%);
            --grad-verde: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            --white: #ffffff;
            --text: #2d3436;
        }

        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            margin: 0; padding: 20px;
            display: flex; justify-content: center;
            color: var(--text);
            overflow-x: hidden;
        }

        /* Pantalla de Bloqueo */
        #bloqueo {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--grad-morado);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; color: white; transition: 0.5s;
        }

        .pin-input {
            background: rgba(255,255,255,0.2);
            border: 2px solid white; color: white;
            font-size: 2rem; width: 150px; text-align: center;
            border-radius: 15px; padding: 10px; margin-top: 20px;
            outline: none; -webkit-text-security: disc; /* Oculta el PIN */
        }

        .app-container { width: 100%; max-width: 400px; display: none; } /* Oculto por defecto */

        h1 { 
            text-align: center; font-weight: 800; font-size: 1.8rem;
            background: var(--grad-morado); -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; margin-bottom: 30px;
        }

        /* Dashboard Grid */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .card-btn {
            background: var(--white); border-radius: 24px; padding: 25px 10px;
            text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: all 0.3s; cursor: pointer; border: 1px solid rgba(255,255,255,0.8);
        }

        .card-btn:active { transform: scale(0.92); }

        .icon-circle {
            width: 55px; height: 55px; border-radius: 50%;
            margin: 0 auto 12px; display: flex; align-items: center;
            justify-content: center; font-size: 24px; color: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .bg-morado { background: var(--grad-morado); }
        .bg-rojo { background: var(--grad-rojo); }
        .bg-azul { background: var(--grad-azul); }
        .bg-verde { background: var(--grad-verde); }

        .card-btn span { font-weight: 700; font-size: 0.8rem; color: #636e72; text-transform: uppercase; }

        /* Secciones */
        .seccion { 
            display: none; background: var(--white); padding: 25px; 
            border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .btn-back { background: #eee; border: none; width: 40px; height: 40px; border-radius: 12px; cursor: pointer; margin-right: 15px; }

        input, select { 
            width: 100%; padding: 15px; margin-top: 8px; border: 2px solid #f1f3f5;
            border-radius: 15px; font-size: 1rem; box-sizing: border-box;
        }

        .btn-send { 
            width: 100%; border: none; padding: 18px; border-radius: 15px; 
            color: white; font-weight: 800; margin-top: 25px; cursor: pointer;
        }

        .purple { background: var(--grad-morado); }
        .red { background: var(--grad-rojo); }
        .blue { background: var(--grad-azul); }
        .green { background: var(--grad-verde); }

        #toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #2d3436; color: white; padding: 12px 25px;
            border-radius: 50px; display: none; z-index: 100;
        }
    </style>
</head>
<body>

<div id="bloqueo">
    <h2>🔒 Acceso Privado</h2>
    <p>Introduce tu PIN</p>
    <input type="number" id="pin" class="pin-input" oninput="checkPin()" pattern="\d*">
</div>

<div class="app-container" id="app">
    <h1>Diario Pro DT1</h1>

    <div id="menu" class="menu-grid">
        <div class="card-btn" onclick="openSec('sec-regla')"><div class="icon-circle bg-morado">📅</div><span>Ciclo</span></div>
        <div class="card-btn" onclick="openSec('sec-eventos')"><div class="icon-circle bg-rojo">⚠️</div><span>Alertas</span></div>
        <div class="card-btn" onclick="openSec('sec-glucosa')"><div class="icon-circle bg-azul">🩸</div><span>Glucosa</span></div>
        <div class="card-btn" onclick="openSec('sec-media')"><div class="icon-circle bg-verde">📊</div><span>Media</span></div>
    </div>

    <div id="sec-regla" class="seccion">
        <button class="btn-back" onclick="goHome()">←</button><h3>Control Ciclo</h3>
        <label>Inicio</label><input type="date" id="regla_ini">
        <label>Fin</label><input type="date" id="regla_fin">
        <button class="btn-send purple" onclick="sendData('REGLA')">Guardar</button>
    </div>

    <div id="sec-eventos" class="seccion">
        <button class="btn-back" onclick="goHome()">←</button><h3>Alerta Urgente</h3>
        <select id="evento_tipo">
            <option value="Hipo <60">🔴 Hipoglucemia Grave</option>
            <option value="Hiper >240">🟠 Hiperglucemia (>240)</option>
        </select>
        <button class="btn-send red" onclick="sendData('EVENTOS')">Enviar</button>
    </div>

    <div id="sec-glucosa" class="seccion">
        <button class="btn-back" onclick="goHome()">←</button><h3>Medición</h3>
        <input type="number" id="glu_val" placeholder="mg/dL">
        <select id="glu_marca" style="margin-top:15px">
            <option value="Normal">Normal</option>
            <option value="Ayunas >130">☀️ Ayunas >130</option>
            <option value="Ayunas <80">🌙 Ayunas <80</option>
        </select>
        <button class="btn-send blue" onclick="sendData('GLUCOSA')">Registrar</button>
    </div>

    <div id="sec-media" class="seccion">
        <button class="btn-back" onclick="goHome()">←</button><h3>Estadística</h3>
        <input type="number" id="med_val" placeholder="Media Semanal">
        <button class="btn-send green" onclick="sendData('MEDIA')">Subir</button>
    </div>
</div>

<div id="toast">¡Guardado! ✨</div>

<script>
    const PIN_CORRECTO = "Idnopiras"; // CAMBIA TU PIN AQUÍ
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbyzt3huXi9UkJLVgM5SZAwazBuSvhXiuYyMCCtn9PPnzDwGy4tMiKb3MJoEgTAGN8fb/exec";;

    function checkPin() {
        const input = document.getElementById('pin').value;
        if(input === PIN_CORRECTO) {
            document.getElementById('bloqueo').style.opacity = "0";
            setTimeout(() => {
                document.getElementById('bloqueo').style.display = "none";
                document.getElementById('app').style.display = "block";
            }, 500);
        }
    }

    function openSec(id) {
        document.getElementById('menu').style.display = 'none';
        document.querySelectorAll('.seccion').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    function goHome() {
        document.getElementById('menu').style.display = 'grid';
        document.querySelectorAll('.seccion').forEach(s => s.style.display = 'none');
    }

    async function sendData(destino) {
        const toast = document.getElementById('toast');
        const btn = event.target;
        btn.innerText = "Enviando...";
        btn.disabled = true;

        let datos = { destino: destino };
        if(destino==='REGLA'){ datos.comienzo=document.getElementById('regla_ini').value; datos.fin=document.getElementById('regla_fin').value; }
        else if(destino==='EVENTOS'){ datos.evento=document.getElementById('evento_tipo').value; }
        else if(destino==='GLUCOSA'){ datos.glucosa=document.getElementById('glu_val').value; datos.marca=document.getElementById('glu_marca').value; }
        else if(destino==='MEDIA'){ datos.valor=document.getElementById('med_val').value; }

        try {
            await fetch(URL_SCRIPT, { method: 'POST', mode: 'no-cors', body: JSON.stringify(datos) });
            toast.style.display = "block";
            setTimeout(() => { toast.style.display = "none"; goHome(); btn.innerText = "Guardar"; btn.disabled = false; }, 2000);
        } catch(e) { alert("Error"); btn.innerText = "Error"; btn.disabled = false; }
    }
</script>
</body>
</html>
