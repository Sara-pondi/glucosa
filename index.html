<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DT1 Elite</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Montserrat:wght@300;400;600&display=swap');

        :root {
            --bg: #050108;
            --glass: rgba(25, 10, 35, 0.7);
            --border: rgba(188, 19, 254, 0.2);
            --accent: #bc13fe; /* Morado Cheshire */
            --pink: #ff2d55;   /* Rosa Cheshire */
            --gold: #d4af37;
            --text: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Montserrat', sans-serif;
            margin: 0; padding: 0; min-height: 100vh;
            color: var(--text);
            background: var(--bg);
            /* Fondo de atmósfera profunda */
            background-image: 
                radial-gradient(circle at top right, rgba(188, 19, 254, 0.1), transparent 50%),
                radial-gradient(circle at bottom left, rgba(255, 45, 85, 0.05), transparent 50%);
            background-attachment: fixed;
        }

        /* Pantalla de Carga Luxury */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
        }
        .smile-loader {
            width: 60px; height: 30px;
            border: 4px solid var(--accent);
            border-radius: 0 0 60px 60px;
            border-top: 0;
            box-shadow: 0 10px 20px var(--accent);
            animation: pulse 1s infinite alternate;
        }
        @keyframes pulse { from { transform: scale(0.9); opacity: 0.5; } to { transform: scale(1.1); opacity: 1; } }

        .app-container { width: 100%; max-width: 420px; padding: 40px 25px; margin: auto; }

        /* Login con Clase */
        #bloqueo {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 8000;
        }
        .pass-input { 
            background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            color: var(--text); padding: 18px; border-radius: 15px; text-align: center;
            font-size: 1.5rem; width: 75%; outline: none; font-family: 'Cinzel';
            letter-spacing: 5px;
        }

        header h1 { 
            font-family: 'Cinzel', serif; font-size: 2.5rem; text-align: center; margin: 0;
            background: linear-gradient(to bottom, #fff, var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }
        .date-label { 
            text-align: center; font-size: 0.7rem; letter-spacing: 3px; 
            color: var(--gold); text-transform: uppercase; margin-top: 5px; margin-bottom: 40px;
            font-weight: 600; opacity: 0.8;
        }

        /* Grid de Menú Estilo "Glass" */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { 
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 24px; padding: 35px 15px;
            text-align: center; cursor: pointer;
            backdrop-filter: blur(12px);
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }
        .card:active { transform: scale(0.92); background: rgba(188, 19, 254, 0.1); border-color: var(--accent); }
        .card i { font-size: 2.2rem; display: block; margin-bottom: 12px; filter: drop-shadow(0 0 10px var(--accent)); }
        .card b { font-family: 'Cinzel'; font-size: 0.9rem; letter-spacing: 1px; color: var(--text); font-weight: 800; }

        /* Secciones */
        .sec { display: none; animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .btn-atras { color: var(--gold); background: none; border: none; font-family: 'Cinzel'; cursor: pointer; margin-bottom: 30px; font-weight: 800; font-size: 0.9rem; }

        .btn-box {
            width: 100%; padding: 25px; border-radius: 20px; border: 1px solid var(--border);
            color: white; font-size: 1rem; font-family: 'Cinzel'; margin-bottom: 15px;
            background: rgba(255,255,255,0.02);
            display: flex; justify-content: space-between; align-items: center;
            font-weight: 800;
        }
        .btn-box:active { background: var(--accent); color: #000; }
        .btn-box.red { border-left: 6px solid var(--pink); }

        .input-v {
            width: 100%; background: none; border: none; border-bottom: 2px solid var(--border);
            padding: 15px; color: var(--accent); font-size: 4rem; text-align: center; 
            font-family: 'Cinzel'; outline: none; margin-bottom: 30px; font-weight: 800;
        }

        .summary-wrapper {
            background: rgba(255,255,255,0.03); border-radius: 30px; padding: 25px;
            border: 1px solid var(--border); box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }
        .summary-item { margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; }
        .summary-item:last-child { border: none; }
        .summary-item label { font-family: 'Cinzel'; font-size: 0.65rem; color: var(--gold); letter-spacing: 2px; display: block; margin-bottom: 8px; }
        .summary-item div { font-size: 1.2rem; font-weight: 400; }

        #notif { 
            position: fixed; top: 40px; left: 50%; transform: translateX(-50%);
            background: var(--accent); color: #000; padding: 12px 30px;
            border-radius: 40px; font-weight: 800; font-family: 'Cinzel'; z-index: 9999; display: none;
            box-shadow: 0 0 30px var(--accent);
        }
    </style>
</head>
<body>

<div id="loader"><div class="smile-loader"></div></div>
<div id="notif">CONFIRMADO</div>

<div id="bloqueo">
    <header><h1>CHESHIRE</h1></header>
    <div class="date-label">Elite Health System</div>
    <input type="password" id="pass" class="pass-input" placeholder="••••">
    <p style="color:var(--accent); margin-top:40px; font-family:'Cinzel'; font-size:0.8rem; cursor:pointer;" onclick="acceder()">Entrar al Sistema</p>
</div>

<div class="app-container" id="app" style="display:none">
    <header>
        <h1>MI DIARIO</h1>
        <div class="date-label" id="txt-fecha"></div>
    </header>
    
    <div id="menu" class="menu-grid">
        <div class="card" onclick="ir('s-glu')"><i>🩸</i><b>GLUCOSA</b></div>
        <div class="card" onclick="ir('s-ale')"><i>⚠️</i><b>ALERTAS</b></div>
        <div class="card" onclick="ir('s-reg')"><i>💧</i><b>CICLO</b></div>
        <div class="card" onclick="ir('s-med')"><i>📊</i><b>MEDIA</b></div>
        <div class="card" onclick="cargarResumen()" style="grid-column: span 2; border: 1px solid var(--accent); background: rgba(188,19,254,0.05)">
            <i>📋</i><b>RESUMEN DEL DÍA</b>
        </div>
    </div>

    <div id="s-glu" class="sec">
        <button class="btn-atras" onclick="volver()">← VOLVER</button>
        <button class="btn-box" onclick="envG('ALTA')">AYUNAS > 130 <span>▲</span></button>
        <button class="btn-box red" onclick="envG('BAJA')">AYUNAS < 80 <span>▼</span></button>
        <input type="number" id="v-m" class="input-v" placeholder="000" inputmode="numeric">
        <button class="btn-box" onclick="envG('MANUAL')" style="justify-content:center; border: 1px solid var(--accent);">GUARDAR VALOR</button>
    </div>

    <div id="s-ale" class="sec">
        <button class="btn-atras" onclick="volver()">← VOLVER</button>
        <button class="btn-box red" onclick="envS('EVENTOS', 'HIPO ↓')">HIPOGLUCEMIA</button>
        <button class="btn-box" onclick="envS('EVENTOS', 'HIPER ↑')">HIPERGLUCEMIA</button>
    </div>

    <div id="s-reg" class="sec">
        <button class="btn-atras" onclick="volver()">← VOLVER</button>
        <button class="btn-box" onclick="regla('INICIO')">INICIAR CICLO</button>
        <button class="btn-box red" onclick="regla('FIN')">TERMINAR CICLO</button>
    </div>

    <div id="s-med" class="sec">
        <button class="btn-atras" onclick="volver()">← VOLVER</button>
        <input type="number" id="v-med" class="input-v" placeholder="000" oninput="calcA1c()">
        <div id="c-a1c" style="display:none; text-align:center; padding:25px; background:var(--glass); border-radius:20px; border:1px solid var(--gold); margin-bottom:30px;">
            <div id="v-a1c" style="font-size:4rem; font-family:'Cinzel'; color:var(--accent)">0.0%</div>
            <div style="font-family:'Cinzel'; font-size:0.7rem; color:var(--gold); letter-spacing:3px;">A1C ESTIMADA</div>
        </div>
        <button class="btn-box" onclick="envS('MEDIA', document.getElementById('v-med').value)" style="justify-content:center; border:1px solid var(--accent)">ENVIAR MEDIA</button>
    </div>

    <div id="s-res" class="sec">
        <button class="btn-atras" onclick="volver()">← VOLVER</button>
        <div class="summary-wrapper">
            <div class="summary-item">
                <label>Glucosa al despertar</label>
                <div id="r-lev" style="font-family:'Cinzel'; font-weight:800; color:var(--accent)">...</div>
            </div>
            <div class="summary-item">
                <label>Promedio Semanal</label>
                <div id="r-med" style="color:var(--text)">...</div>
            </div>
            <div class="summary-item">
                <label>Alertas del día</label>
                <div id="r-hpo">...</div>
                <div id="r-hpe" style="margin-top:8px">...</div>
            </div>
        </div>
    </div>
</div>

<script>
    const CLAVE = "Idnopiras"; 
    const URL_APP = "https://script.google.com/macros/s/AKfycbzdYhjgVmixnrpw0nBCOTTGRPob5J2oU9unnz5VjaKhDrZz_F-qOl6vTZsZZQnzqtNm/exec";

    document.getElementById('txt-fecha').innerText = new Date().toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' }).toUpperCase();

    function acceder() { 
        if(document.getElementById('pass').value === CLAVE) { 
            document.getElementById('bloqueo').style.display = "none"; 
            document.getElementById('app').style.display = "block"; 
        } 
    }
    document.getElementById('pass').addEventListener('keypress', (e) => { if(e.key==='Enter') acceder(); });

    function ir(id) { document.getElementById('menu').style.display = 'none'; document.getElementById(id).style.display = 'block'; }
    function volver() { document.getElementById('menu').style.display = 'grid'; document.querySelectorAll('.sec').forEach(s => s.style.display = 'none'); }

    function calcA1c() {
        const m = document.getElementById('v-med').value;
        const c = document.getElementById('c-a1c');
        const v = document.getElementById('v-a1c');
        if (m > 50) {
            c.style.display = 'block';
            const a = (parseFloat(m) + 46.7) / 28.7;
            v.innerText = a.toFixed(1) + "%";
            v.style.color = a > 8 ? "var(--pink)" : "var(--accent)";
        } else { c.style.display = 'none'; }
    }

    async function cargarResumen() {
        document.getElementById('loader').style.display = 'flex';
        ir('s-res');
        try {
            const resp = await fetch(URL_APP);
            const d = await resp.json();
            document.getElementById('r-lev').innerText = d.levantado;
            document.getElementById('r-med').innerText = d.mediaInfo;
            document.getElementById('r-hpo').innerText = d.hipoInfo;
            document.getElementById('r-hpe').innerText = d.hiperInfo;
            document.getElementById('r-hpo').style.color = d.hipoInfo.includes("⚠️") ? "var(--pink)" : "#4ade80";
            document.getElementById('r-hpe').style.color = d.hiperInfo.includes("⚠️") ? "var(--pink)" : "#4ade80";
        } catch (e) { document.getElementById('r-lev').innerText = "Error de red"; }
        document.getElementById('loader').style.display = 'none';
    }

    function regla(tipo) {
        const u = localStorage.getItem('last_reg');
        if (tipo === 'INICIO' && u) {
            if (((new Date() - new Date(u)) / 86400000) < 20 && !confirm("¿Segura?")) return;
        }
        if (tipo === 'INICIO') localStorage.setItem('last_reg', new Date());
        envS('REGLA', tipo);
    }

    function envG(tipo) {
        let d = { destino: 'GLUCOSA' };
        if(tipo==='ALTA'){ d.alta="X"; d.glucosa=">130"; } 
        else if(tipo==='BAJA'){ d.baja="X"; d.glucosa="<80"; }
        else if(tipo==='MANUAL'){ d.otros=document.getElementById('v-m').value; d.glucosa="MANUAL"; }
        enviar(d);
    }

    function envS(dest, val) { if(!val) return; enviar({ destino: dest, valor: val }); }

    function enviar(datos) {
        document.getElementById('loader').style.display = 'flex';
        fetch(URL_APP, { method: 'POST', mode: 'no-cors', body: JSON.stringify(datos) })
        .then(() => { 
            document.getElementById('loader').style.display = 'none';
            msg("REGISTRADO");
            setTimeout(() => { volver(); }, 1200); 
        });
    }

    function msg(t) { 
        const n = document.getElementById('notif'); n.innerText = t; n.style.display = "block";
        setTimeout(()=> n.style.display="none", 2500);
    }
</script>
</body>
</html>
