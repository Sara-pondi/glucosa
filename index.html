<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wonderland Candy Elite</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=Grandstander:wght@700;900&display=swap');
        :root { --rosa: #ff4dff; --azul: #00d4ff; --lila: #a64dff; --verde: #39ff14; --fondo: #120024; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Bubblegum Sans', cursive; margin: 0; background: var(--fondo); color: white; overflow-x: hidden; }

        /* PANTALLA DE CARGA PIRULETA */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(18, 0, 36, 0.95); display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10000; backdrop-filter: blur(10px);
        }
        .piruleta {
            width: 80px; height: 80px;
            background: conic-gradient(var(--rosa), var(--azul), var(--lila), var(--verde), var(--rosa));
            border-radius: 50%; border: 5px solid white;
            animation: spin 0.8s infinite linear; position: relative;
        }
        .piruleta::after { content: ''; position: absolute; top: 80px; left: 35px; width: 10px; height: 50px; background: white; border-radius: 5px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* NOTIFICACIÓN */
        #notif { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; color: var(--lila); padding: 30px; border-radius: 40px;
            font-family: 'Grandstander'; font-size: 2rem; z-index: 10001; display: none;
            border: 8px solid var(--verde); box-shadow: 0 0 50px var(--rosa);
        }

        .app-container { width: 100%; max-width: 420px; padding: 20px; margin: auto; text-align: center; }
        h1 { font-family: 'Grandstander'; font-size: 3rem; text-shadow: 3px 3px var(--rosa); margin-bottom: 20px; }

        /* LOGIN */
        #bloqueo {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--fondo); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 9999;
        }
        .pass-input { 
            background: rgba(255,255,255,0.1); border: 5px solid var(--rosa);
            color: white; padding: 15px; border-radius: 20px; text-align: center;
            font-size: 2rem; width: 70%; outline: none; font-family: 'Grandstander';
        }

        /* MENÚ Y BOTONES */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: rgba(255,255,255,0.1); border-radius: 25px; padding: 20px; cursor: pointer; border: 2px solid rgba(255,255,255,0.1); }
        .card i { font-style: normal; font-size: 2.5rem; display: block; }
        
        .sec { display: none; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn-box { width: 100%; padding: 18px; border-radius: 20px; border: none; color: white; font-family: 'Grandstander'; font-size: 1.2rem; margin-bottom: 12px; cursor: pointer; box-shadow: 0 5px 0 rgba(0,0,0,0.3); }
        .btn-box:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.3); }

        input, select { width: 100%; padding: 12px; border-radius: 15px; border: 3px solid var(--lila); margin-top: 5px; font-size: 1rem; font-family: 'Bubblegum Sans'; }

        .status-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 10px; }
        .st-btn { padding: 10px; border-radius: 10px; opacity: 0.3; font-family: 'Grandstander'; cursor: pointer; text-align: center; }
        .st-btn.active { opacity: 1; border: 2px solid white; transform: scale(1.05); }

        .resumen-panel { background: white; color: #333; border-radius: 30px; padding: 25px; text-align: left; box-shadow: 0 10px 0 var(--lila); line-height: 1.5; }
        .destaque { color: var(--rosa); font-weight: 900; }
    </style>
</head>
<body>

<div id="loader"><div class="piruleta"></div><h2 style="color:var(--azul); font-family:'Grandstander'; margin-top:20px;">CARGANDO...</h2></div>
<div id="notif">¡REGISTRADO! ✨</div>

<div id="bloqueo">
    <h1>Wonderland</h1>
    <input type="password" id="pass" class="pass-input" placeholder="CODE">
    <button onclick="acceder()" class="btn-box" style="background:var(--rosa); width:auto; margin-top:20px; padding:10px 50px;">ENTRAR</button>
</div>

<div class="app-container" id="app" style="display:none">
    <h1>Mi Diario</h1>
    <div id="menu" class="menu-grid">
        <div class="card" onclick="ir('s-glu')"><i>🍬</i><b>Ayunas</b></div>
        <div class="card" onclick="ir('s-com')"><i>🍱</i><b>Comidas</b></div>
        <div class="card" onclick="ir('s-ale')"><i>🍄</i><b>Alertas</b></div>
        <div class="card" onclick="ir('s-reg')"><i>🎀</i><b>Ciclo</b></div>
        <div class="card" onclick="ir('s-med')"><i>🍭</i><b>Media</b></div>
        <div class="card" style="grid-column: span 2; background: var(--lila)" onclick="obtenerResumen()"><i>✨</i><b>Resumen de Hoy</b></div>
    </div>

    <div id="s-glu" class="sec">
        <button class="btn-box" style="background:var(--azul)" onclick="volver()">VOLVER</button>
        <button class="btn-box" style="background:var(--lila)" onclick="enviar({destino:'GLUCOSA', valor:'MAYOR DE 130'})">MAYOR DE 130 ▲</button>
        <button class="btn-box" style="background:var(--rosa)" onclick="enviar({destino:'GLUCOSA', valor:'MENOR DE 80'})">MENOR DE 80 ▼</button>
        <button class="btn-box" style="background:var(--verde); color:black" onclick="enviar({destino:'GLUCOSA', valor:'OK'})">OK</button>
    </div>

    <div id="s-com" class="sec">
        <button class="btn-box" style="background:var(--azul)" onclick="volver()">VOLVER</button>
        <input type="text" id="c-nom" placeholder="¿Qué has comido?">
        <select id="c-tipo" style="margin-top:10px">
            <option>Desayuno</option><option>Almuerzo</option><option>Comida</option><option>Merienda</option><option>Cena</option>
        </select>
        <input type="number" id="c-ins" placeholder="Unidades insulina" style="margin-top:10px">
        <div class="status-grid">
            <div class="st-btn" id="h-hipo" style="background:var(--azul)" onclick="setSt('HIPO')">HIPO</div>
            <div class="st-btn active" id="h-ok" style="background:var(--verde); color:black" onclick="setSt('OK')">OK</div>
            <div class="st-btn" id="h-hiper" style="background:var(--rosa)" onclick="setSt('HIPER')">HIPER</div>
        </div>
        <button class="btn-box" style="background:var(--lila); margin-top:20px" onclick="envCom()">GUARDAR BANQUETE</button>
    </div>

    <div id="s-reg" class="sec">
        <button class="btn-box" style="background:var(--azul)" onclick="volver()">VOLVER</button>
        <button class="btn-box" style="background:var(--rosa)" onclick="enviar({destino:'CICLO', valor:'INICIO'})">INICIO CICLO</button>
        <button class="btn-box" style="background:var(--lila)" onclick="enviar({destino:'CICLO', valor:'FIN'})">FIN CICLO</button>
    </div>

    <div id="s-med" class="sec">
        <button class="btn-box" style="background:var(--azul)" onclick="volver()">VOLVER</button>
        <input type="number" id="v-med" placeholder="Valor de glucosa media">
        <button class="btn-box" style="background:var(--verde); color:black; margin-top:10px" onclick="enviar({destino:'MEDIA', valor:document.getElementById('v-med').value})">REGISTRAR</button>
    </div>

    <div id="s-ale" class="sec">
        <button class="btn-box" style="background:var(--azul)" onclick="volver()">VOLVER</button>
        <button class="btn-box" style="background:var(--rosa)" onclick="enviar({destino:'ALERTAS', valor:'SANGRE BAJA'})">¡SANGRE BAJA!</button>
        <button class="btn-box" style="background:var(--lila)" onclick="enviar({destino:'ALERTAS', valor:'SANGRE ALTA'})">¡SANGRE ALTA!</button>
    </div>

    <div id="s-res" class="sec">
        <button class="btn-box" style="background:var(--azul)" onclick="volver()">VOLVER</button>
        <div id="res-cont" class="resumen-panel"></div>
    </div>
</div>

<script>
    const URL_APP = "https://script.google.com/macros/s/AKfycbzdYhjgVmixnrpw0nBCOTTGRPob5J2oU9unnz5VjaKhDrZz_F-qOl6vTZsZZQnzqtNm/exec";
    let curSt = "OK";

    function acceder() { 
        if(document.getElementById('pass').value === "Idnopiras") { 
            document.getElementById('bloqueo').style.display='none'; 
            document.getElementById('app').style.display='block'; 
        } else {
            alert("Código incorrecto, Alicia.");
        }
    }

    function ir(id) { document.getElementById('menu').style.display='none'; document.getElementById(id).style.display='block'; }
    function volver() { document.getElementById('menu').style.display='grid'; document.querySelectorAll('.sec').forEach(s=>s.style.display='none'); }
    
    function setSt(v) { 
        curSt = v; 
        document.querySelectorAll('.st-btn').forEach(b=>b.classList.remove('active')); 
        document.getElementById('h-'+v.toLowerCase()).classList.add('active'); 
    }

    function enviar(d) {
        document.getElementById('loader').style.display='flex';
        fetch(URL_APP, { method:'POST', mode:'no-cors', body:JSON.stringify(d) })
        .then(()=>{ 
            document.getElementById('loader').style.display='none'; 
            document.getElementById('notif').style.display='block'; 
            setTimeout(()=>{ document.getElementById('notif').style.display='none'; volver(); }, 2000); 
        });
    }

    function envCom() {
        enviar({ 
            destino:'COMIDAS', 
            tipo: document.getElementById('c-tipo').value, 
            comida: document.getElementById('c-nom').value, 
            insulina: document.getElementById('c-ins').value, 
            estado: curSt 
        });
    }

    async function obtenerResumen() {
        ir('s-res');
        document.getElementById('loader').style.display='flex';
        try {
            const r = await fetch(URL_APP);
            const d = await r.json();
            let h = `<h2 style="font-family:'Grandstander'; color:var(--lila); text-align:center;">Crónica de Hoy</h2>`;
            h += `<p>🌅 <b>Ayunas:</b> <span class="destaque">${d.ayunas}</span></p>`;
            h += `<p>🍱 <b>Banquete:</b> ${d.comida ? d.comida.plato + " (" + d.comida.tipo + ") con " + d.comida.insu + "u. Sentó: <span class='destaque'>" + d.comida.estado + "</span>" : "No existen datos"}</p>`;
            h += `<p>🍭 <b>Media:</b> <span class="destaque">${d.media}</span></p>`;
            
            if(d.alertas && d.alertas.length > 0) {
                h += `<p style="color:var(--rosa)">⚠️ <b>Alertas:</b> ${d.alertas[0].tipo} (${d.alertas[0].hora})</p>`;
            } else {
                h += `<p>🌈 <b>Alertas:</b> Todo tranquilo hoy.</p>`;
            }
            document.getElementById('res-cont').innerHTML = h;
        } catch(e) { 
            document.getElementById('res-cont').innerHTML = "El espejo mágico no responde. Revisa la URL."; 
        }
        document.getElementById('loader').style.display='none';
    }
</script>
</body>
</html>
