<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DT1 Ultra-Modern</title>
    <style>
        :root {
            --bg: #050505;
            --card: #121212;
            --neon-p: #bc13fe;
            --neon-r: #ff073a;
            --neon-b: #00f3ff;
            --text: #ffffff;
        }

        body { 
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg); color: var(--text);
            margin: 0; padding: 20px; display: flex; justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        .app-container { width: 100%; max-width: 420px; }

        /* Pantalla de Bloqueo */
        #bloqueo {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 1000;
        }
        .pass-input { 
            background: transparent; border: none; border-bottom: 2px solid var(--neon-p);
            color: white; padding: 10px; text-align: center; font-size: 1.5rem;
            width: 60%; outline: none; letter-spacing: 5px;
        }

        /* Título Estilo Película */
        h1 { font-size: 2.5rem; font-weight: 900; letter-spacing: -2px; margin: 20px 0; line-height: 0.9; }
        h1 span { display: block; font-size: 1.2rem; color: var(--neon-p); letter-spacing: 4px; text-transform: uppercase; }

        /* Grid Principal */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 40px; }
        .card { 
            background: var(--card); border-radius: 40px; padding: 35px 20px;
            text-align: center; cursor: pointer; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #222; position: relative; overflow: hidden;
        }
        .card::before { content: ''; position: absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(45deg, transparent, rgba(255,255,255,0.03)); }
        .card:active { transform: scale(0.9) translateY(5px); border-color: var(--neon-p); }
        .card i { font-size: 2.5rem; display: block; margin-bottom: 15px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); }
        .card b { font-size: 0.7rem; letter-spacing: 2px; color: #666; text-transform: uppercase; }

        /* Secciones */
        .sec { display: none; animation: fadeIn 0.5s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; filter: blur(10px); } to { opacity: 1; filter: blur(0); } }

        .btn-back { background: none; border: none; color: #555; font-size: 0.9rem; font-weight: 800; cursor: pointer; margin-bottom: 20px; padding: 0; }
        
        /* Botones Acción Estilo Neón */
        .btn-action {
            width: 100%; padding: 25px; border-radius: 30px; border: none;
            color: white; font-size: 1.1rem; font-weight: 800; margin-bottom: 15px;
            cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .purple { background: #1a1a1a; border: 1px solid var(--neon-p); box-shadow: inset 0 0 15px rgba(188, 19, 254, 0.2); }
        .red { background: #1a1a1a; border: 1px solid var(--neon-r); box-shadow: inset 0 0 15px rgba(255, 7, 58, 0.2); }
        .blue { background: #1a1a1a; border: 1px solid var(--neon-b); box-shadow: inset 0 0 15px rgba(0, 243, 255, 0.2); }

        /* Inputs */
        input[type="number"] {
            width: 100%; background: #111; border: 1px solid #333; padding: 25px;
            border-radius: 25px; color: white; font-size: 2rem; text-align: center; margin-bottom: 20px;
        }

        #toast { 
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: white; color: black; padding: 15px 40px; border-radius: 100px;
            font-weight: 900; font-size: 0.8rem; display: none; z-index: 2000;
        }
    </style>
</head>
<body>

<div id="bloqueo">
    <h1>DIARIO<span>LOG IN</span></h1>
    <input type="password" id="pass" class="pass-input" placeholder="••••">
    <button onclick="check()" style="margin-top:40px; background:none; border:none; color:var(--neon-p); font-weight:900; cursor:pointer; letter-spacing:2px">ACCESS</button>
</div>

<div class="app-container main-app" id="app">
    <h1>CONTROL<span>DASHBOARD</span></h1>
    
    <div id="menu" class="menu-grid">
        <div class="card" onclick="show('s-glu')"><i>⚡</i><b>GLUCOSA</b></div>
        <div class="card" onclick="show('s-ale')"><i>🔥</i><b>ALERTA</b></div>
        <div class="card" onclick="show('s-reg')"><i>🌸</i><b>CICLO</b></div>
        <div class="card" onclick="show('s-med')"><i>📈</i><b>MEDIA</b></div>
    </div>

    <div id="s-glu" class="sec">
        <button class="btn-back" onclick="home()">← ESC</button>
        <button class="btn-action purple" onclick="env('ALTA')">Ayunando > 130 <span>⚡</span></button>
        <button class="btn-action blue" onclick="env('BAJA')">Ayunando < 80 <span>❄️</span></button>
        <button class="btn-action" style="background:#222" onclick="document.getElementById('p-o').style.display='block'">Escribir Valor...</button>
        <div id="p-o" style="display:none; margin-top:20px">
            <input type="number" id="v-otros" inputmode="numeric">
            <button class="btn-action purple" onclick="env('MANUAL')" style="justify-content:center">GUARDAR</button>
        </div>
    </div>

    <div id="s-ale" class="sec">
        <button class="btn-back" onclick="home()">← ESC</button>
        <button class="btn-action red" onclick="envSimple('EVENTOS', 'HIPO ↓')">HIPOGLUCEMIA <b style="font-size:1.5rem">↓</b></button>
        <button class="btn-action purple" onclick="envSimple('EVENTOS', 'HIPER ↑')">HIPERGLUCEMIA <b style="font-size:1.5rem">↑</b></button>
    </div>

    <div id="s-reg" class="sec">
        <button class="btn-back" onclick="home()">← ESC</button>
        <button class="btn-action purple" onclick="checkRegla('INICIO')">INICIO CICLO <span>▶</span></button>
        <button class="btn-action red" onclick="checkRegla('FIN')">FINAL CICLO <span>■</span></button>
    </div>

    <div id="s-med" class="sec">
        <button class="btn-back" onclick="home()">← ESC</button>
        <input type="number" id="v-med" placeholder="0.0">
        <button class="btn-action blue" onclick="envSimple('MEDIA', document.getElementById('v-med').value)" style="justify-content:center">SUBIR MEDIA</button>
    </div>
</div>

<div id="toast">SYSTEM UPDATED</div>

<script>
    const P_OK = "Idnopiras"; 
    const URL = "https://script.google.com/macros/s/AKfycbzdYhjgVmixnrpw0nBCOTTGRPob5J2oU9unnz5VjaKhDrZz_F-qOl6vTZsZZQnzqtNm/exec";

    function check() { if(document.getElementById('pass').value === P_OK) { document.getElementById('bloqueo').style.display = "none"; document.getElementById('app').style.display = "block"; } }
    function show(id) { document.getElementById('menu').style.display = 'none'; document.getElementById(id).style.display = 'block'; }
    function home() { document.getElementById('menu').style.display = 'grid'; document.querySelectorAll('.sec').forEach(s => s.style.display = 'none'); }

    // --- LOGICA DE INTELIGENCIA PARA LA REGLA ---
    function checkRegla(tipo) {
        const ultimaVez = localStorage.getItem('lastRegla');
        const hoy = new Date();
        
        if (ultimaVez) {
            const fechaPasada = new Date(ultimaVez);
            const diferenciaDias = (hoy - fechaPasada) / (1000 * 60 * 60 * 24);
            
            if (diferenciaDias < 25) {
                if (!confirm("¡Atención! Registraste un ciclo hace menos de 25 días. ¿Seguro que quieres registrar otro?")) {
                    return;
                }
            }
        }
        
        localStorage.setItem('lastRegla', hoy);
        envSimple('REGLA', tipo);
    }

    async function env(tipo) {
        const t = document.getElementById('toast'); t.style.display="block"; t.innerText="SENDING...";
        let d = { destino: 'GLUCOSA' };
        if(tipo==='ALTA'){ d.alta="X"; d.glucosa=">130"; } 
        if(tipo==='BAJA'){ d.baja="X"; d.glucosa="<80"; }
        if(tipo==='MANUAL'){ d.otros=document.getElementById('v-otros').value; d.glucosa="MANUAL"; }

        fetch(URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(d) })
        .then(() => { t.innerText="CONFIRMED ✨"; setTimeout(()=>{t.style.display="none"; home();}, 1500); })
    }

    async function envSimple(dest, val) {
        const t = document.getElementById('toast'); t.style.display="block";
        fetch(URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ destino: dest, valor: val }) })
        .then(() => { t.innerText="SUCCESS ✅"; setTimeout(()=>{t.style.display="none"; home();}, 1500); });
    }
</script>
</body>
</html>
