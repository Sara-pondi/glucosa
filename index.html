<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DT1 Pro - Registro Rápido</title>
    <style>
        :root {
            --grad: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --rojo: #ff5f6d; --naranja: #ff9f43; --azul: #54a0ff; --verde: #10ac84;
        }

        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 400px; }
        
        /* Bloqueo */
        #bloqueo { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--grad); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .login-box { background: rgba(255,255,255,0.2); padding: 30px; border-radius: 30px; backdrop-filter: blur(10px); text-align: center; width: 80%; }
        .pass-input { width: 100%; padding: 15px; border-radius: 15px; border: none; font-size: 1.2rem; text-align: center; }

        /* Dashboard */
        .main-app { display: none; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: white; border-radius: 25px; padding: 25px; text-align: center; box-shadow: 0 8px 15px rgba(0,0,0,0.05); cursor: pointer; }
        
        /* Secciones */
        .sec { display: none; background: white; padding: 25px; border-radius: 30px; box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .btn-back { background: #f1f3f5; border: none; padding: 10px 15px; border-radius: 12px; margin-bottom: 15px; cursor: pointer; font-weight: bold; }

        /* BOTONES DE GLUCOSA ESPECÍFICOS */
        .glu-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 10px; }
        .btn-glu { 
            padding: 20px; border-radius: 20px; border: none; color: white; 
            font-size: 1.1rem; font-weight: 800; cursor: pointer; transition: 0.2s;
        }
        .btn-glu:active { transform: scale(0.95); }
        
        .b-naranja { background: var(--naranja); }
        .b-azul { background: var(--azul); }
        .b-otros { background: #576574; }

        #area-otros { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px solid #eee; }
        input[type="number"] { width: 100%; padding: 15px; border-radius: 15px; border: 2px solid #eee; font-size: 1.2rem; text-align: center; box-sizing: border-box; }

        .btn-send { width: 100%; border: none; padding: 20px; border-radius: 20px; color: white; font-weight: 800; margin-top: 15px; cursor: pointer; }
        
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #2d3436; color: white; padding: 15px 30px; border-radius: 50px; display: none; z-index: 100; }
    </style>
</head>
<body>

<div id="bloqueo">
    <div class="login-box">
        <input type="password" id="pass" class="pass-input" placeholder="Contraseña">
        <button onclick="check()" style="width:100%; margin-top:10px; padding:15px; border-radius:15px; border:none; font-weight:bold;">ENTRAR</button>
    </div>
</div>

<div class="app-container main-app" id="app">
    <h1 style="text-align:center; color:#764ba2">Mi Diario DT1</h1>
    
    <div id="menu" class="menu-grid">
        <div class="card" onclick="show('s-glu')"><i>🩸</i><br><b>GLUCOSA</b></div>
        <div class="card" onclick="show('s-ale')"><i>⚠️</i><br><b>ALERTA</b></div>
        <div class="card" onclick="show('s-reg')"><i>📅</i><br><b>REGLA</b></div>
        <div class="card" onclick="show('s-med')"><i>📊</i><br><b>MEDIA</b></div>
    </div>

    <div id="s-glu" class="sec">
        <button class="btn-back" onclick="home()">← VOLVER</button>
        <h2 style="margin-bottom:20px">¿Cómo estás hoy?</h2>
        
        <div class="glu-grid">
            <button class="btn-glu b-naranja" onclick="enviarGlucosa('ALTA')">☀️ AYUNAS > 130</button>
            <button class="btn-glu b-azul" onclick="enviarGlucosa('BAJA')">🌙 AYUNAS < 80</button>
            <button class="btn-glu b-otros" onclick="mostrarOtros()">✏️ OTROS (Escribir)</button>
        </div>

        <div id="area-otros">
            <input type="number" id="v-otros" placeholder="Escribe valor mg/dL" inputmode="numeric">
            <button class="btn-send b-otros" onclick="enviarGlucosa('MANUAL')">GUARDAR OTROS</button>
        </div>
    </div>

    <div id="s-ale" class="sec"><button class="btn-back" onclick="home()">← VOLVER</button><h2>Alerta</h2><button class="btn-send" style="background:red" onclick="enviarSimple('EVENTOS', 'HIPO')">🚨 HIPO GRAVE</button></div>
    <div id="s-reg" class="sec"><button class="btn-back" onclick="home()">← VOLVER</button><h2>Ciclo</h2><button class="btn-send" style="background:purple" onclick="enviarSimple('REGLA', 'INICIO')">REGISTRAR HOY</button></div>
    <div id="s-med" class="sec"><button class="btn-back" onclick="home()">← VOLVER</button><h2>Media</h2><input type="number" id="v-med" placeholder="Media"><button class="btn-send" style="background:green" onclick="enviarSimple('MEDIA', document.getElementById('v-med').value)">SUBIR</button></div>
</div>

<div id="toast">¡Guardado! ✨</div>

<script>
    const P_OK = "Idnopiras"; 
    const URL = "https://script.google.com/macros/s/AKfycbyzt3huXi9UkJLVgM5SZAwazBuSvhXiuYyMCCtn9PPnzDwGy4tMiKb3MJoEgTAGN8fb/exec";

    function check() { if(document.getElementById('pass').value === P_OK) { document.getElementById('bloqueo').style.display = "none"; document.getElementById('app').style.display = "block"; } }
    function show(id) { document.getElementById('menu').style.display = 'none'; document.getElementById(id).style.display = 'block'; }
    function home() { document.getElementById('menu').style.display = 'grid'; document.querySelectorAll('.sec').forEach(s => s.style.display = 'none'); document.getElementById('area-otros').style.display='none'; }
    function mostrarOtros() { document.getElementById('area-otros').style.display = 'block'; }

    async function enviarGlucosa(tipo) {
        const t = document.getElementById('toast');
        t.style.display = "block"; t.innerText = "Enviando...";
        
        let d = { destino: 'GLUCOSA' };
        
        // Mapeo según tus columnas de Google Sheet
        if(tipo === 'ALTA')   { d.marca = "> 130"; d.glucosa = "130"; } 
        if(tipo === 'BAJA')   { d.marca = "< 80";  d.glucosa = "80"; }
        if(tipo === 'MANUAL') { d.marca = "OTROS"; d.glucosa = document.getElementById('v-otros').value; }

        try {
            await fetch(URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(d) });
            t.innerText = "¡Dato guardado! ✨";
            setTimeout(() => { t.style.display="none"; home(); }, 1500);
        } catch(e) { t.innerText = "Error ❌"; }
    }

    async function enviarSimple(dest, val) {
        const t = document.getElementById('toast'); t.style.display = "block";
        let d = { destino: dest, valor: val };
        try {
            await fetch(URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(d) });
            t.innerText = "Guardado ✅";
            setTimeout(() => { t.style.display="none"; home(); }, 1500);
        } catch(e) { t.innerText = "Error ❌"; }
    }
</script>
</body>
</html>
