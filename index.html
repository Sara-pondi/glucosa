<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyDT1 - Glow Edition</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-dark: #1e293b;
            --accent-purple: #c084fc;
            --accent-pink: #f472b6;
            --text-main: #f8fafc;
            --glow: 0 0 15px rgba(192, 132, 252, 0.4);
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-dark); color: var(--text-main);
            margin: 0; padding: 20px; display: flex; justify-content: center;
        }

        .app-container { width: 100%; max-width: 400px; }

        /* Pantalla de Bloqueo Estilo "Cyber" */
        #bloqueo {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 1000;
        }
        .pass-input { 
            background: var(--card-dark); border: 2px solid var(--accent-purple);
            color: white; padding: 15px; border-radius: 50px; text-align: center;
            font-size: 1.2rem; width: 70%; outline: none; box-shadow: var(--glow);
        }

        /* Dashboard de Diseño */
        .main-app { display: none; }
        h1 { font-size: 2.2rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 30px; text-align: left; }
        h1 span { color: var(--accent-purple); }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { 
            background: var(--card-dark); border-radius: 30px; padding: 30px 15px;
            text-align: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
        }
        .card:active { transform: scale(0.95); filter: brightness(1.2); }
        .card i { font-size: 2rem; display: block; margin-bottom: 10px; }
        .card b { font-size: 0.8rem; letter-spacing: 1px; color: #94a3b8; }

        /* Secciones */
        .sec { display: none; animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        .btn-back { background: none; border: 1px solid #334155; color: white; padding: 8px 15px; border-radius: 50px; margin-bottom: 20px; cursor: pointer; }

        /* Botones Glucosa Estilo "Mando de Consola" */
        .action-list { display: flex; flex-direction: column; gap: 12px; }
        .btn-glow {
            padding: 25px; border-radius: 25px; border: none; color: white;
            font-size: 1.1rem; font-weight: 700; cursor: pointer;
            text-align: left; position: relative; overflow: hidden;
        }
        .purple-glow { background: linear-gradient(90deg, #7e22ce, #a855f7); box-shadow: 0 4px 15px rgba(126, 34, 206, 0.4); }
        .pink-glow { background: linear-gradient(90deg, #be185d, #ec4899); box-shadow: 0 4px 15px rgba(190, 24, 93, 0.4); }
        .gray-glow { background: #334155; }

        #panel-otros { margin-top: 20px; }
        input[type="number"] { 
            width: 100%; background: var(--card-dark); border: 1px solid #475569;
            padding: 20px; border-radius: 20px; color: white; font-size: 1.5rem; text-align: center;
        }

        #toast { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--accent-purple); color: black; padding: 15px 40px;
            border-radius: 50px; font-weight: 800; display: none; z-index: 2000;
        }
    </style>
</head>
<body>

<div id="bloqueo">
    <h2 style="margin-bottom:20px">MY<span>DT1</span></h2>
    <input type="password" id="pass" class="pass-input" placeholder="PASS">
    <button onclick="check()" style="margin-top:20px; background:none; border:none; color:var(--accent-purple); font-weight:800; cursor:pointer;">ACCEDER</button>
</div>

<div class="app-container main-app" id="app">
    <h1>Hey! <span>Control.</span></h1>
    
    <div id="menu" class="menu-grid">
        <div class="card" onclick="show('s-glu')"><i>⚡</i><b>GLUCOSA</b></div>
        <div class="card" onclick="show('s-ale')"><i>🔥</i><b>ALERTA</b></div>
        <div class="card" onclick="show('s-reg')"><i>🌸</i><b>CICLO</b></div>
        <div class="card" onclick="show('s-med')"><i>📈</i><b>MEDIA</b></div>
    </div>

    <div id="s-glu" class="sec">
        <button class="btn-back" onclick="home()">VOLVER</button>
        <div class="action-list">
            <button class="btn-glow purple-glow" onclick="env('ALTA')">Ayunando > 130</button>
            <button class="btn-glow pink-glow" onclick="env('BAJA')">Ayunando < 80</button>
            <button class="btn-glow gray-glow" onclick="document.getElementById('panel-otros').style.display='block'">Otro Valor...</button>
        </div>
        <div id="panel-otros" style="display:none">
            <input type="number" id="v-otros" inputmode="numeric">
            <button class="btn-glow purple-glow" style="width:100%; margin-top:10px; text-align:center" onclick="env('MANUAL')">GUARDAR</button>
        </div>
    </div>

    <div id="s-ale" class="sec"><button class="btn-back" onclick="home()">VOLVER</button><button class="btn-glow pink-glow" onclick="envSimple('EVENTOS', 'HIPO')">🚨 AVISO HIPO</button></div>
    <div id="s-reg" class="sec"><button class="btn-back" onclick="home()">VOLVER</button><button class="btn-glow purple-glow" onclick="envSimple('REGLA', 'INICIO')">MARCAR CICLO HOY</button></div>
    <div id="s-med" class="sec"><button class="btn-back" onclick="home()">VOLVER</button><input type="number" id="v-med" placeholder="MEDIA"><button class="btn-glow purple-glow" style="width:100%; margin-top:10px" onclick="envSimple('MEDIA', document.getElementById('v-med').value)">SUBIR</button></div>
</div>

<div id="toast">LOGGED! ✨</div>

<script>
    const P_OK = "Idnopiras"; 
    const URL = "https://script.google.com/macros/s/AKfycbzdYhjgVmixnrpw0nBCOTTGRPob5J2oU9unnz5VjaKhDrZz_F-qOl6vTZsZZQnzqtNm/exec";

    function check() { if(document.getElementById('pass').value === P_OK) { document.getElementById('bloqueo').style.display = "none"; document.getElementById('app').style.display = "block"; } }
    function show(id) { document.getElementById('menu').style.display = 'none'; document.getElementById(id).style.display = 'block'; }
    function home() { document.getElementById('menu').style.display = 'grid'; document.querySelectorAll('.sec').forEach(s => s.style.display = 'none'); }

    async function env(tipo) {
        const t = document.getElementById('toast'); t.style.display="block"; t.innerText="ENVIANDO...";
        let d = { destino: 'GLUCOSA' };
        if(tipo==='ALTA'){ d.alta="X"; d.glucosa=">130"; } 
        if(tipo==='BAJA'){ d.baja="X"; d.glucosa="<80"; }
        if(tipo==='MANUAL'){ d.otros=document.getElementById('v-otros').value; d.glucosa="MANUAL"; }

        fetch(URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(d) })
        .then(() => { t.innerText="¡GUARDADO! ✨"; setTimeout(()=>{t.style.display="none"; home();}, 1500); })
        .catch(() => { t.innerText="ERROR ❌"; });
    }

    async function envSimple(dest, val) {
        const t = document.getElementById('toast'); t.style.display="block";
        fetch(URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ destino: dest, valor: val }) })
        .then(() => { t.innerText="¡LISTO! ✅"; setTimeout(()=>{t.style.display="none"; home();}, 1500); });
    }
</script>
</body>
</html>
