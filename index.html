<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DT1 Wonderland</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Quicksand:wght@300;500&display=swap');

        :root {
            --negro: #0a020a;
            --morado-v: #2d0a3d;
            --morado-l: #bc13fe;
            --rojo-v: #4a0404;
            --rojo-l: #ff073a;
            --texto: #f2e6f2;
        }

        body { 
            font-family: 'Quicksand', sans-serif;
            background: var(--negro); color: var(--texto);
            margin: 0; padding: 0; overflow-x: hidden;
            background-image: radial-gradient(circle at center, var(--morado-v) 0%, var(--negro) 100%);
        }

        /* Animación de Gota al cargar */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--negro); display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 5000;
        }
        .gota {
            width: 40px; height: 40px; background: var(--morado-l);
            border-radius: 0 50% 50% 50%; transform: rotate(45deg);
            animation: goteo 1.2s infinite ease-in-out;
            box-shadow: 0 0 20px var(--morado-l);
        }
        @keyframes goteo {
            0% { transform: translateY(-50px) rotate(45deg) scale(0.8); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(100px) rotate(45deg) scale(1.2); opacity: 0; }
        }

        .app-container { width: 100%; max-width: 430px; padding: 40px 25px; box-sizing: border-box; margin: auto; }

        /* Pantalla de Bloqueo */
        #bloqueo {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--negro); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 4000;
        }
        .pass-input { 
            background: rgba(255,255,255,0.05); border: 1px solid var(--morado-l);
            color: white; padding: 20px; border-radius: 50px; text-align: center;
            font-size: 1.5rem; width: 70%; outline: none; font-family: 'Cinzel';
        }

        h1 { font-family: 'Cinzel'; font-size: 2.2rem; text-align: center; color: var(--morado-l); text-shadow: 0 0 15px var(--morado-l); margin-bottom: 5px; }
        .sub { text-align: center; color: var(--rojo-l); font-size: 0.8rem; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 40px; }

        /* Botones Estilo "Viscoso" */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { 
            background: linear-gradient(145deg, #1a051a, #050105);
            border-radius: 20px 40px 20px 40px; padding: 25px 10px;
            text-align: center; cursor: pointer; border: 1px solid var(--borde);
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5); transition: 0.3s;
            border-bottom: 3px solid var(--morado-v);
        }
        .card:active { transform: scale(0.9) rotate(-2deg); border-bottom: 1px solid var(--morado-l); }
        .card i { font-size: 2.5rem; filter: drop-shadow(0 0 10px var(--morado-l)); }
        .card b { display: block; margin-top: 10px; font-family: 'Cinzel'; letter-spacing: 1px; }

        .sec { display: none; animation: blurIn 0.5s ease; }
        @keyframes blurIn { from { filter: blur(10px); opacity: 0; } to { filter: blur(0); opacity: 1; } }

        .btn-atras { color: var(--rojo-l); background: none; border: none; font-family: 'Cinzel'; cursor: pointer; margin-bottom: 20px; }

        .btn-box {
            width: 100%; padding: 24px; border-radius: 20px; border: none;
            color: white; font-size: 1.1rem; font-family: 'Cinzel'; margin-bottom: 15px;
            background: rgba(20, 5, 20, 0.8); border-left: 5px solid var(--morado-l);
            box-shadow: 10px 10px 20px rgba(0,0,0,0.4); display: flex; justify-content: space-between; align-items: center;
        }
        .btn-box.red { border-left-color: var(--rojo-l); color: var(--rojo-l); }

        .input-v {
            width: 100%; background: none; border: none; border-bottom: 2px solid var(--morado-l);
            padding: 15px; color: white; font-size: 3rem; text-align: center; font-family: 'Cinzel'; outline: none;
        }

        .summary-card {
            background: rgba(45, 10, 61, 0.2); border-radius: 30px; padding: 25px;
            border: 1px solid var(--morado-v); margin-bottom: 15px;
            backdrop-filter: blur(5px);
        }

        #notif { 
            position: fixed; top: 20px; width: 80%; left: 10%; 
            background: var(--morado-l); color: black; padding: 15px;
            border-radius: 50px; text-align: center; font-weight: 700; display: none;
        }
    </style>
</head>
<body>

<div id="loader"><div class="gota"></div><p style="font-family:'Cinzel'; margin-top:20px">Sincronizando sangre...</p></div>
<div id="notif">REGISTRADO</div>

<div id="bloqueo">
    <h1>WONDERLAND</h1>
    <input type="password" id="pass" class="pass-input" placeholder="PALABRA CLAVE">
</div>

<div class="app-container" id="app" style="display:none">
    <h1>MI DIARIO</h1>
    <div class="sub">Control de Sangre & Tiempo</div>
    
    <div id="menu" class="menu-grid">
        <div class="card" onclick="ir('s-glu')"><i>🩸</i><b>SANGRE</b></div>
        <div class="card" onclick="ir('s-ale')"><i>🃏</i><b>ALERTAS</b></div>
        <div class="card" onclick="ir('s-reg')"><i>💧</i><b>CICLO</b></div>
        <div class="card" onclick="ir('s-med')"><i>📉</i><b>MEDIA</b></div>
        <div class="card" onclick="cargarResumen()" style="grid-column: span 2; border: 1px solid var(--rojo-l)"><i>🕯️</i><b>RESUMEN DEL DÍA</b></div>
    </div>

    <div id="s-glu" class="sec">
        <button class="btn-atras" onclick="volver()">← REGRESAR</button>
        <button class="btn-box" onclick="envG('ALTA')">AYUNAS > 130 <span>▲</span></button>
        <button class="btn-box" onclick="envG('BAJA')">AYUNAS < 80 <span>▼</span></button>
        <input type="number" id="v-m" class="input-v" placeholder="000" inputmode="numeric">
        <button class="btn-box" onclick="envG('MANUAL')" style="margin-top:20px; justify-content:center">GUARDAR MANUAL</button>
    </div>

    <div id="s-ale" class="sec">
        <button class="btn-atras" onclick="volver()">← REGRESAR</button>
        <button class="btn-box red" onclick="envS('EVENTOS', 'HIPO ↓')">HIPOGLUCEMIA ↓</button>
        <button class="btn-box" onclick="envS('EVENTOS', 'HIPER ↑')">HIPERGLUCEMIA ↑</button>
    </div>

    <div id="s-reg" class="sec">
        <button class="btn-atras" onclick="volver()">← REGRESAR</button>
        <button class="btn-box" onclick="regla('INICIO')">INICIAR CICLO <span>▶</span></button>
        <button class="btn-box red" onclick="regla('FIN')">CERRAR CICLO <span>■</span></button>
    </div>

    <div id="s-med" class="sec">
        <button class="btn-atras" onclick="volver()">← REGRESAR</button>
        <input type="number" id="v-med" class="input-v" placeholder="000" oninput="calcA1c()">
        <div id="c-a1c" style="display:none; text-align:center; padding:20px">
            <div id="v-a1c" style="font-size:3.5rem; font-family:'Cinzel'; color:var(--morado-l)">0.0%</div>
            <div style="font-size:0.8rem; letter-spacing:2px">A1C ESTIMADA</div>
        </div>
        <button class="btn-box" onclick="envS('MEDIA', document.getElementById('v-med').value)" style="margin-top:20px; justify-content:center">SUBIR MEDIA</button>
    </div>

    <div id="s-res" class="sec">
        <button class="btn-atras" onclick="volver()">← REGRESAR</button>
        <div class="summary-card"><div id="r-lev" style="font-family:'Cinzel'; font-size:1.2rem">...</div></div>
        <div class="summary-card"><div id="r-med" style="color:var(--morado-l)">...</div></div>
        <div class="summary-card"><div id="r-hpo">...</div><div id="r-hpe" style="margin-top:10px">...</div></div>
    </div>
</div>

<script>
    const CLAVE = "Idnopiras"; 
    const URL_APP = "https://script.google.com/macros/s/AKfycbzdYhjgVmixnrpw0nBCOTTGRPob5J2oU9unnz5VjaKhDrZz_F-qOl6vTZsZZQnzqtNm/exec";

    function acceder() { 
        if(document.getElementById('pass').value === CLAVE) { 
            document.getElementById('bloqueo').style.display = "none"; 
            document.getElementById('app').style.display = "block"; 
        } 
    }
    // Listener para el Enter en el password
    document.getElementById('pass').addEventListener('keypress', (e) => { if(e.key==='Enter') acceder(); });

    function ir(id) { document.getElementById('menu').style.display = 'none'; document.getElementById(id).style.display = 'block'; }
    function volver() { document.getElementById('menu').style.display = 'grid'; document.querySelectorAll('.sec').forEach(s => s.style.display = 'none'); }

    function calcA1c() {
        const m = document.getElementById('v-med').value;
        const c = document.getElementById('c-a1c');
        const v = document.getElementById('v-a1c');
        if (m > 50) {
            c.style.display = 'block';
            const a = (parseFloat(m) + 46.7) / 28.7;
            v.innerText = a.toFixed(1) + "%";
            v.style.color = a > 8 ? "var(--rojo-l)" : "var(--morado-l)";
        } else { c.style.display = 'none'; }
    }

    async function cargarResumen() {
        document.getElementById('loader').style.display = 'flex';
        ir('s-res');
        try {
            const resp = await fetch(URL_APP);
            const d = await resp.json();
            document.getElementById('r-lev').innerText = d.levantado;
            document.getElementById('r-med').innerText = d.mediaInfo;
            document.getElementById('r-hpo').innerText = d.hipoInfo;
            document.getElementById('r-hpe').innerText = d.hiperInfo;
        } catch (e) { document.getElementById('r-lev').innerText = "Error de conexión"; }
        document.getElementById('loader').style.display = 'none';
    }

    function regla(tipo) {
        const u = localStorage.getItem('last_reg');
        if (tipo === 'INICIO' && u) {
            if (((new Date() - new Date(u)) / 86400000) < 20 && !confirm("¿Tan pronto, Alicia?")) return;
        }
        if (tipo === 'INICIO') localStorage.setItem('last_reg', new Date());
        envS('REGLA', tipo);
    }

    function envG(tipo) {
        let d = { destino: 'GLUCOSA' };
        if(tipo==='ALTA'){ d.alta="X"; d.glucosa=">130"; } 
        else if(tipo==='BAJA'){ d.baja="X"; d.glucosa="<80"; }
        else if(tipo==='MANUAL'){ d.otros=document.getElementById('v-m').value; d.glucosa="MANUAL"; }
        enviar(d);
    }

    function envS(dest, val) { if(!val) return; enviar({ destino: dest, valor: val }); }

    function enviar(datos) {
        document.getElementById('loader').style.display = 'flex';
        fetch(URL_APP, { method: 'POST', mode: 'no-cors', body: JSON.stringify(datos) })
        .then(() => { 
            document.getElementById('loader').style.display = 'none';
            msg("SANGRE REGISTRADA");
            setTimeout(() => { volver(); }, 1200); 
        });
    }

    function msg(t) { 
        const n = document.getElementById('notif'); n.innerText = t; n.style.display = "block";
        setTimeout(()=> n.style.display="none", 2000);
    }
</script>
</body>
</html>
