<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wonderland Candy Elite</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=Grandstander:wght@700;900&display=swap');

        :root {
            --rosa: #ff4dff;
            --azul: #00d4ff;
            --lila: #a64dff;
            --verde: #39ff14;
            --fondo: #120024;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Bubblegum Sans', cursive; margin: 0; 
            background: var(--fondo); color: white; overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 0%, rgba(166, 77, 255, 0.2) 0%, transparent 70%);
        }

        /* CARGA ESPECTACULAR */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(18, 0, 36, 0.98); display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10000; backdrop-filter: blur(15px);
        }
        .piruleta-portal {
            width: 120px; height: 120px;
            background: conic-gradient(var(--rosa), var(--azul), var(--lila), var(--verde), var(--rosa));
            border-radius: 50%; animation: spinPortal 0.6s infinite linear;
            box-shadow: 0 0 60px var(--rosa); border: 10px solid white;
        }
        .loading-text { margin-top: 30px; font-family: 'Grandstander'; font-size: 1.5rem; letter-spacing: 3px; animation: pulse 1s infinite alternate; }
        @keyframes spinPortal { to { transform: rotate(360deg); } }
        @keyframes pulse { from { opacity: 0.4; } to { opacity: 1; } }

        /* NOTIFICACIÓN GIGANTE */
        #notif { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; color: var(--lila); padding: 40px; border-radius: 50px;
            font-family: 'Grandstander'; font-size: 2.5rem; z-index: 10001; display: none;
            box-shadow: 0 0 100px var(--rosa); border: 12px solid var(--verde);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn { from { scale: 0; } to { scale: 1; } }

        /* LOGIN */
        #bloqueo {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--fondo); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 9999;
        }
        .pass-input { 
            background: rgba(255,255,255,0.1); border: 5px solid var(--rosa);
            color: white; padding: 20px; border-radius: 30px; text-align: center;
            font-size: 2.5rem; width: 70%; outline: none; font-family: 'Grandstander';
        }

        /* CONTENEDOR */
        .app-container { width: 100%; max-width: 420px; padding: 25px; margin: auto; text-align: center; }
        h1 { font-family: 'Grandstander'; font-size: 3.5rem; text-shadow: 4px 4px 0 var(--rosa); margin-bottom: 25px; }

        /* MENÚ */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { 
            background: rgba(255,255,255,0.08); border: 3px solid rgba(255,255,255,0.2);
            border-radius: 30px; padding: 20px; cursor: pointer;
        }
        .card i { font-style: normal; font-size: 2.8rem; display: block; margin-bottom: 5px; }
        .card b { font-family: 'Grandstander'; text-transform: uppercase; font-size: 0.9rem; }

        /* BOTONES Y FORMULARIOS */
        .sec { display: none; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .btn-box {
            width: 100%; padding: 20px; border-radius: 25px; border: none;
            color: white; font-size: 1.3rem; font-family: 'Grandstander'; margin-bottom: 15px;
            cursor: pointer; box-shadow: 0 8px 0 rgba(0,0,0,0.3);
        }
        .btn-box:active { transform: translateY(4px); box-shadow: 0 4px 0 rgba(0,0,0,0.3); }

        .form-group { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 25px; margin-bottom: 15px; text-align: left; }
        label { font-family: 'Grandstander'; color: var(--azul); font-size: 0.9rem; display: block; margin-bottom: 8px; }
        select, input { width: 100%; padding: 12px; border-radius: 15px; border: 3px solid var(--lila); font-family: 'Bubblegum Sans'; font-size: 1.1rem; }

        /* RESUMEN REDACTADO */
        .resumen-panel {
            background: white; color: var(--fondo); border-radius: 40px; padding: 30px;
            box-shadow: 0 20px 0 var(--lila); text-align: left; line-height: 1.5;
        }
        .resumen-panel p { font-size: 1.2rem; margin-bottom: 15px; }
        .res-destaque { color: var(--rosa); font-weight: 900; font-family: 'Grandstander'; }

        .status-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .status-btn { padding: 10px; border-radius: 15px; border: 3px solid transparent; font-family: 'Grandstander'; opacity: 0.4; cursor: pointer; text-align: center; }
        .status-btn.active { opacity: 1; border-color: white; transform: scale(1.05); }
    </style>
</head>
<body>

<div id="loader"><div class="piruleta-portal"></div><div class="loading-text">ABRIENDO PORTAL...</div></div>
<div id="notif">¡REGISTRADO! ✨</div>

<div id="bloqueo">
    <h1>Wonderland</h1>
    <input type="password" id="pass" class="pass-input" placeholder="CODE">
    <button onclick="acceder()" style="margin-top:20px; background:var(--rosa); color:white; border:none; padding:15px 40px; border-radius:30px; font-family:'Grandstander';">ENTRAR</button>
</div>

<div class="app-container" id="app" style="display:none">
    <h1>Mi Diario</h1>
    
    <div id="menu" class="menu-grid">
        <div class="card" onclick="ir('s-glu')"><i>🍬</i><b>Ayunas</b></div>
        <div class="card" onclick="ir('s-com')"><i>🍱</i><b>Comidas</b></div>
        <div class="card" onclick="ir('s-ale')"><i>🍄</i><b>Alertas</b></div>
        <div class="card" onclick="ir('s-reg')"><i>🎀</i><b>Ciclo</b></div>
        <div class="card" onclick="ir('s-med')"><i>🍭</i><b>Media</b></div>
        <div class="card" style="grid-column: span 2; background: var(--lila);" onclick="obtenerResumen()"><i>✨</i><b>Resumen de Hoy</b></div>
    </div>

    <div id="s-glu" class="sec">
        <button class="btn-box" style="background:var(--azul)" onclick="volver()">← VOLVER</button>
        <button onclick="envG('MAYOR DE 130')" class="btn-box" style="background:var(--lila)">MAYOR DE 130 ▲</button>
        <button onclick="envG('MENOR DE 80')" class="btn-box" style="background:var(--rosa)">MENOR DE 80 ▼</button>
    </div>

    <div id="s-com" class="sec">
        <button class="btn-box" style="background:var(--azul)" onclick="volver()">← VOLVER</button>
        <div class="form-group">
            <label>¿QUÉ TOCA?</label>
            <select id="com-tipo">
                <option value="Desayuno">Desayuno</option>
                <option value="Almuerzo">Almuerzo</option>
                <option value="Comida">Comida</option>
                <option value="Merienda">Merienda</option>
                <option value="Cena">Cena</option>
            </select>
        </div>
        <div class="form-group"><label>EL BANQUETE</label><input type="text" id="com-nombre" placeholder="Ej: Pizza..."></div>
        <div class="form-group"><label>INSULINA</label><input type="number" id="com-insu" placeholder="0"></div>
        <div class="form-group">
            <label>RESULTADO</label>
            <div class="status-grid">
                <div class="status-btn" style="background:var(--azul)" id="st-hipo" onclick="selStatus('hipo')">HIPO</div>
                <div class="status-btn active" style="background:var(--verde); color:black" id="st-ok" onclick="selStatus('ok')">OK</div>
                <div class="status-btn" style="background:var(--rosa)" id="st-hiper" onclick="selStatus('hiper')">HIPER</div>
            </div>
        </div>
        <button class="btn-box" style="background:var(--verde); color:black" onclick="envComida()">GUARDAR RECETA</button>
    </div>

    <div id="s-ale" class="sec">
        <button class="btn-box" style="background:var(--azul)" onclick="volver()">← VOLVER</button>
        <button onclick="enviarS('ALERTAS', 'SANGRE BAJA')" class="btn-box" style="background:var(--rosa)">¡SANGRE BAJA!</button>
        <button onclick="enviarS('ALERTAS', 'SANGRE ESPESA')" class="btn-box" style="background:var(--lila)">¡SANGRE ESPESA!</button>
    </div>

    <div id="s-res" class="sec">
        <button class="btn-box" style="background:var(--azul)" onclick="volver()">← VOLVER</button>
        <div class="resumen-panel" id="resumen-texto"></div>
    </div>
</div>

<script>
    const CLAVE = "Idnopiras"; 
    const URL_APP = "https://script.google.com/macros/s/AKfycbzdYhjgVmixnrpw0nBCOTTGRPob5J2oU9unnz5VjaKhDrZz_F-qOl6vTZsZZQnzqtNm/exec";
    let statusComida = "OK";

    function acceder() { 
        if(document.getElementById('pass').value === CLAVE) { 
            document.getElementById('bloqueo').style.display = "none"; 
            document.getElementById('app').style.display = "block"; 
        } 
    }

    function ir(id) { document.getElementById('menu').style.display = 'none'; document.getElementById(id).style.display = 'block'; }
    function volver() { document.getElementById('menu').style.display = 'grid'; document.querySelectorAll('.sec').forEach(s => s.style.display = 'none'); }

    function selStatus(val) {
        statusComida = val.toUpperCase();
        document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('st-' + val).classList.add('active');
    }

    function envG(v) { enviar({ destino: 'GLUCOSA', valor: v }); }
    
    function envComida() {
        enviar({
            destino: 'COMIDAS',
            tipo: document.getElementById('com-tipo').value,
            comida: document.getElementById('com-nombre').value,
            insulina: document.getElementById('com-insu').value,
            estado: statusComida
        });
    }

    function enviar(datos) {
        document.getElementById('loader').style.display = 'flex';
        fetch(URL_APP, { method: 'POST', mode: 'no-cors', body: JSON.stringify(datos) })
        .then(() => {
            document.getElementById('loader').style.display = 'none';
            const n = document.getElementById('notif');
            n.style.display = "block";
            setTimeout(() => { n.style.display = "none"; volver(); }, 2000);
        });
    }

    async function obtenerResumen() {
        ir('s-res');
        const panel = document.getElementById('resumen-texto');
        panel.innerHTML = "Consultando el libro de hoy...";
        // Aquí conectas con tu doGet de Apps Script
        const data = { vacio: false, ayunas: "Mayor de 130", comida: "Pizza", estado: "OK", alertas: [{tipo: "SANGRE BAJA", hora: "16:45"}] };
        
        setTimeout(() => {
            let texto = `<h2 style="font-family:'Grandstander'; color:var(--lila)">Crónica de hoy</h2>`;
            texto += `<p>Al despertar, el azúcar estaba <b class="res-destaque">${data.ayunas}</b>.</p>`;
            texto += `<p>En la comida, tomaste <b class="res-destaque">${data.comida}</b> y todo terminó en un estado <b class="res-destaque">${data.estado}</b>.</p>`;
            if(data.alertas.length > 0) {
                data.alertas.forEach(a => {
                    texto += `<p style="color:red">⚠️ ¡Atención! Registraste <b class="res-destaque">${a.tipo}</b> a las ${a.hora}.</p>`;
                });
            }
            panel.innerHTML = texto;
        }, 1000);
    }
</script>
</body>
</html>
