<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DT1 Pro Care</title>
    <style>
        :root {
            --morado: #6b46c1;
            --morado-claro: #9f7aea;
            --rojo: #e53e3e;
            --rojo-suave: #fff5f5;
            --fondo: #f7fafc;
            --texto: #2d3748;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--fondo); 
            color: var(--texto);
            margin: 0; padding: 20px;
            display: flex; justify-content: center;
        }

        .app-container { width: 100%; max-width: 420px; }

        h1 { font-size: 1.5rem; color: var(--morado); text-align: center; margin-bottom: 25px; font-weight: 800; }

        /* Menu de Inicio Estilo Dashboard */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .card-btn {
            background: white;
            padding: 30px 15px;
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(107, 70, 193, 0.1);
            border: 2px solid transparent;
            transition: all 0.3s ease;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }

        .card-btn:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(107, 70, 193, 0.15); }
        .card-btn:active { transform: scale(0.95); }

        .card-btn i { font-size: 2rem; }
        .card-btn span { font-weight: 700; font-size: 0.9rem; letter-spacing: 0.5px; }

        /* Colores específicos de iconos */
        .icon-regla { color: var(--morado); }
        .icon-eventos { color: var(--rojo); }
        .icon-glucosa { color: #3182ce; }
        .icon-media { color: #38a169; }

        /* Secciones de formulario */
        .seccion { 
            display: none; 
            background: white; 
            padding: 25px; 
            border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-seccion { display: flex; align-items: center; margin-bottom: 20px; gap: 15px; }
        .btn-atras { 
            background: var(--morado-claro); color: white; border: none; 
            width: 35px; height: 35px; border-radius: 50%; cursor: pointer; font-weight: bold;
        }

        /* Inputs Profesionales */
        label { display: block; margin-top: 15px; font-size: 0.85rem; font-weight: 700; color: #718096; text-transform: uppercase; }
        input, select { 
            width: 100%; padding: 14px; margin-top: 8px; 
            border: 2px solid #edf2f7; border-radius: 12px; 
            font-size: 1rem; transition: 0.3s; outline: none;
        }
        input:focus { border-color: var(--morado); background: #fff; }

        .btn-enviar { 
            width: 100%; 
            background: linear-gradient(135deg, var(--morado), var(--morado-claro)); 
            color: white; border: none; padding: 16px; border-radius: 12px; 
            font-weight: 800; font-size: 1rem; margin-top: 25px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(107, 70, 193, 0.3);
        }

        .btn-enviar:active { transform: scale(0.98); opacity: 0.9; }

        /* Estilo para los avisos de glucosa */
        .alerta-visual {
            padding: 12px; border-radius: 10px; margin-top: 15px; text-align: center; font-weight: bold; font-size: 0.9rem;
        }
        .alerta-roja { background: var(--rojo-suave); color: var(--rojo); border: 1px solid var(--rojo); }

    </style>
</head>
<body>

<div class="app-container">
    <h1>Mi Diario Dulce 🩸</h1>

    <div id="menu" class="menu-grid">
        <div class="card-btn" onclick="abrir('sec-regla')">
            <span class="icon-regla">📅</span>
            <span>REGLA</span>
        </div>
        <div class="card-btn" onclick="abrir('sec-eventos')">
            <span class="icon-eventos">⚠️</span>
            <span>EVENTOS</span>
        </div>
        <div class="card-btn" onclick="abrir('sec-glucosa')">
            <span class="icon-glucosa">🩸</span>
            <span>GLUCOSA</span>
        </div>
        <div class="card-btn" onclick="abrir('sec-media')">
            <span class="icon-media">📊</span>
            <span>MEDIA</span>
        </div>
    </div>

    <div id="sec-regla" class="seccion">
        <div class="header-seccion">
            <button class="btn-atras" onclick="home()">←</button>
            <h3 style="margin:0; color:var(--morado)">Control Ciclo</h3>
        </div>
        <label>Fecha Inicio</label>
        <input type="date" id="regla_ini">
        <label>Fecha Fin (Si ha terminado)</label>
        <input type="date" id="regla_fin">
        <button class="btn-enviar" onclick="enviar('REGLA')">GUARDAR CICLO</button>
    </div>

    <div id="sec-eventos" class="seccion">
        <div class="header-seccion">
            <button class="btn-atras" onclick="home()">←</button>
            <h3 style="margin:0; color:var(--rojo)">Aviso Urgente</h3>
        </div>
        <label>Tipo de Alerta</label>
        <select id="evento_tipo">
            <option value="Hipo <60">🔴 Hipoglucemia Grave (<60)</option>
            <option value="Hiper >240">🟠 Hiperglucemia (>240)</option>
        </select>
        <button class="btn-enviar" style="background: var(--rojo)" onclick="enviar('EVENTOS')">REGISTRAR EVENTO</button>
    </div>

    <div id="sec-glucosa" class="seccion">
        <div class="header-seccion">
            <button class="btn-atras" onclick="home()">←</button>
            <h3 style="margin:0; color:#3182ce">Glucemia Diaria</h3>
        </div>
        <label>Valor (mg/dL)</label>
        <input type="number" id="glu_val" placeholder="000" oninput="chequear()">
        <div id="alerta-glu" class="alerta-visual alerta-roja" style="display:none"></div>
        
        <label>Momento del día</label>
        <select id="glu_marca">
            <option value="Normal">Normal</option>
            <option value="Ayunas >130">Ayunas >130</option>
            <option value="Ayunas <80">Ayunas <80</option>
        </select>
        <button class="btn-enviar" style="background: #3182ce" onclick="enviar('GLUCOSA')">GUARDAR LECTURA</button>
    </div>

    <div id="sec-media" class="seccion">
        <div class="header-seccion">
            <button class="btn-atras" onclick="home()">←</button>
            <h3 style="margin:0; color:#38a169">Estadística</h3>
        </div>
        <label>Media Semanal (Manual)</label>
        <input type="number" id="med_val" placeholder="Ej: 132">
        <button class="btn-enviar" style="background: #38a169" onclick="enviar('MEDIA')">SUBIR MEDIA</button>
    </div>
</div>

<script>
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbyzt3huXi9UkJLVgM5SZAwazBuSvhXiuYyMCCtn9PPnzDwGy4tMiKb3MJoEgTAGN8fb/exec";

    function abrir(id) {
        document.getElementById('menu').style.display = 'none';
        document.querySelectorAll('.seccion').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    function home() {
        document.getElementById('menu').style.display = 'grid';
        document.querySelectorAll('.seccion').forEach(s => s.style.display = 'none');
    }

    function chequear() {
        const v = document.getElementById('glu_val').value;
        const alerta = document.getElementById('alerta-glu');
        if(v > 0 && v < 70) {
            alerta.innerText = "⚠️ Glucosa Baja: ¡Cuidado!";
            alerta.style.display = "block";
        } else if(v > 180) {
            alerta.innerText = "⚠️ Glucosa Alta";
            alerta.style.display = "block";
        } else {
            alerta.style.display = "none";
        }
    }

    async function enviar(destino) {
        let datos = { destino: destino };
        
        // Lógica de recolección de datos
        if(destino === 'REGLA') {
            datos.comienzo = document.getElementById('regla_ini').value;
            datos.fin = document.getElementById('regla_fin').value;
        } else if(destino === 'EVENTOS') {
            datos.evento = document.getElementById('evento_tipo').value;
        } else if(destino === 'GLUCOSA') {
            datos.glucosa = document.getElementById('glu_val').value;
            datos.marca = document.getElementById('glu_marca').value;
        } else if(destino === 'MEDIA') {
            datos.valor = document.getElementById('med_val').value;
        }

        // Efecto visual de "Enviando"
        const btn = event.target;
        const originalText = btn.innerText;
        btn.innerText = "ENVIANDO...";
        btn.disabled = true;

        try {
            await fetch(URL_SCRIPT, { method: 'POST', mode: 'no-cors', body: JSON.stringify(datos) });
            alert("¡Datos guardados! ✨");
            home();
        } catch(e) {
            alert("Error de conexión");
        } finally {
            btn.innerText = originalText;
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
